name: Permanent deploy script

on:
  push:
    branches: [main]
    paths:
      - "ops/deploy/**"
      - "backend/Dockerfile"
      - "web/**"
      - "compose.yaml"
      - ".github/workflows/deploy-script.yml"
  pull_request:
    paths:
      - "ops/deploy/**"
      - "backend/Dockerfile"
      - "web/**"
      - "compose.yaml"
      - ".github/workflows/deploy-script.yml"

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Validate Bash syntax
        run: bash -n ops/deploy/deploy.sh

      - name: ShellCheck
        run: shellcheck --severity=warning ops/deploy/deploy.sh

      - name: Enforce ADR-003 single permanent entrypoint
        run: |
          python - <<'PY'
          from pathlib import Path

          allowed = {
              "deploy.sh",
              "nails-002e5-date-availability.sh",  # historical, not executable
              "nails-002e6-combined-operations.sh",  # historical, not executable
          }
          entrypoints = {p.name for p in Path("ops/deploy").glob("*.sh")}
          unexpected = entrypoints - allowed
          assert not unexpected, (
              "new per-release runbooks are forbidden by ADR-003; "
              f"unexpected: {sorted(unexpected)}"
          )

          deploy = Path("ops/deploy/deploy.sh").read_text(encoding="utf-8")
          for phrase in (
              '[[ -f "${BASH_SOURCE[0]}" ]]',
              'SOURCE_REF="${NAILS_RELEASE_REF:-origin/main}"',
              "origin/pr/[0-9]+",
              '"rollback"',
              "rollback SHA is not an ancestor",
              "CANDIDATE_DEPLOY_OK=true",
              "candidate deployment changed production checkout",
              "NAILS_GIT_SHA",
              "merge-base --is-ancestor",
              "worktree add --detach",
              '--file "$WORKTREE/compose.yaml"',
              "docker run --rm -i --network none",
              "from app.api.onboarding import router as onboarding_router",
              "from app.api.scheduling import router as scheduling_router",
              'path.startswith("/api/v1/onboarding")',
              'path.startswith("/api/v1/scheduling")',
              "BUILT_API_IMAGE_OK=true",
              "BUILT_WEB_IMAGE_OK=true",
              "pg_dump",
              "gzip -t",
              'API_IMAGE_RETAGGED="true"',
              'WEB_IMAGE_RETAGGED="true"',
              'docker image tag "$ROLLBACK_API_IMAGE" "$API_IMAGE"',
              'docker image tag "$ROLLBACK_WEB_IMAGE" "$WEB_IMAGE"',
              'compose build --build-arg GIT_SHA="$RELEASE_SHA" nails-api nails-web',
              'compose up -d --no-deps --force-recreate --no-build nails-api nails-web',
              'compose rm -sf nails-web',
              'wait_api_ready',
              'wait_web_ready',
              'reset --hard "$RELEASE_SHA"',
              '-e APP_TIMEZONE=UTC',
              '-e DATABASE_URL=postgresql+psycopg://smoke:smoke@127.0.0.1:5432/smoke',
              '-e INTERNAL_API_KEY=deploy-smoke-key-0000000000000000',
          ):
              assert phrase in deploy, f"deploy.sh lost mandatory safeguard: {phrase}"

          assert deploy.count("docker compose") == 1, (
              "all compose operations must use the permanent worktree wrapper"
          )
          assert deploy.count("< /dev/null") == 3, (
              "every compose exec in deploy.sh must have isolated stdin"
          )
          assert deploy.count('git -C "$REPO" merge --ff-only') == 1, (
              "candidate flow must not add another checkout mutation"
          )
          assert deploy.index('docker image tag "$API_IMAGE" "$ROLLBACK_API_IMAGE"') < (
              deploy.index('compose build --build-arg GIT_SHA="$RELEASE_SHA"')
          )
          assert deploy.index('compose build --build-arg GIT_SHA="$RELEASE_SHA"') < (
              deploy.index("docker run --rm -i --network none")
          )
          assert deploy.index("docker run --rm -i --network none") < deploy.index(
              'compose up -d --no-deps --force-recreate --no-build nails-api nails-web'
          )

          api_dockerfile = Path("backend/Dockerfile").read_text(encoding="utf-8")
          assert "ARG GIT_SHA" in api_dockerfile
          assert "NAILS_GIT_SHA" in api_dockerfile

          web_dockerfile = Path("web/Dockerfile").read_text(encoding="utf-8")
          assert "ARG GIT_SHA" in web_dockerfile
          assert "NAILS_GIT_SHA" in web_dockerfile
          assert "/web-health" in web_dockerfile

          principles = Path("docs/operations/engineering-principles.md")
          assert principles.is_file(), "engineering principles are mandatory"

          print("DEPLOY_SCRIPT_CONTRACT_OK=true")
          PY
