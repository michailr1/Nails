name: Ruff diagnostics

on:
  pull_request:
    paths:
      - "backend/**"
      - "hermes/plugins/nails_scheduling/**"
      - ".github/workflows/ruff-diagnostics.yml"

permissions:
  contents: read

jobs:
  diagnostics:
    runs-on: ubuntu-latest
    steps:
      - name: Download exact pull request merge tree
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          curl --fail --silent --show-error --location \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}/tarball/${GITHUB_SHA}" \
            | tar -xz --strip-components=1
      - name: Install Ruff
        run: python -m pip install --quiet 'ruff==0.9.10'
      - name: Backend diagnostics
        run: ruff check backend --config backend/pyproject.toml --output-format concise
      - name: Scheduling plugin diagnostics
        if: always()
        run: >-
          ruff check hermes/plugins/nails_scheduling
          --config backend/pyproject.toml
          --output-format concise
