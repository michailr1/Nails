name: Temporary Slice E Skill Update

on:
  pull_request:

permissions:
  contents: write

jobs:
  update:
    if: github.head_ref == 'feat/adr007-slice-e-photo-price-import'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feat/adr007-slice-e-photo-price-import
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: |
          python - <<'PY'
          from pathlib import Path

          path = Path("hermes/skills/nails-scheduling/SKILL.md")
          text = path.read_text(encoding="utf-8")
          marker = (
              "Услуги не удаляются физически. «Удалить услугу» означает безопасную "
              "архивацию через `is_active=false`; восстановление — `is_active=true`. "
              "При `service_name_conflict` остановись и не перезаписывай другую услугу.\n"
          )
          section = """

          ### Импорт прайса по фото

          1. Используй разрешённый `vision`, чтобы прочитать одно или несколько фото. Не утверждай, что неразборчивое значение распознано точно.
          2. Объедини все фото в одну полную таблицу. Для каждой строки покажи категорию, название, base/addon, тип цены, цену или диапазон/единицу и длительность.
          3. Длительность базы и `extra_minutes` допа показывай отдельной колонкой **«моя прикидка»**. Это предложение Нэйли, а не факт с фотографии, пока мастер его не подтвердил.
          4. До write заново вызови `list_services`, сравни текущий каталог с полной будущей таблицей и явно скажи, какие позиции будут созданы, изменены и архивированы.
          5. Отсутствующая в подтверждённой таблице активная позиция будет архивирована, а не удалена. Существующие записи сохранят прежние price/duration snapshots.
          6. Правки мастера применяй к таблице в памяти диалога и снова показывай всю итоговую таблицу. Не выполняй отдельные `create_service` или `update_service` для строк этого импорта.
          7. Одно «да» допустимо только после одной непосредственно предшествующей полной таблицы и сводки изменений. Затем вызови `replace_catalog`, передав весь каталог и `confirmed=true`.
          8. Считай импорт успешным только при `ok=true`. Используй возвращённые `created_count`, `updated_count`, `archived_count` и полный `services` как обязательный readback; не показывай внутренние ID.
          9. При ошибке одной строки весь batch считается неприменённым. Не сообщай о частичном сохранении и не повторяй write автоматически.
          """
          section = "\n".join(line.strip() for line in section.strip().splitlines())
          if "### Импорт прайса по фото" in text:
              raise SystemExit("photo import section already exists")
          if marker not in text:
              raise SystemExit("service section marker not found")
          path.write_text(text.replace(marker, marker + section + "\n", 1), encoding="utf-8")
          PY
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add hermes/skills/nails-scheduling/SKILL.md
          git commit -m 'docs: define photo price import flow'
          git push origin HEAD:feat/adr007-slice-e-photo-price-import
