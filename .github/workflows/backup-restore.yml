name: Backup and restore contract

on:
  push:
    branches: [main]
    paths:
      - "ops/backup/**"
      - "ops/edge/**"
      - "web/**"
      - "compose.yaml"
      - ".github/workflows/backup-restore.yml"
  pull_request:
    paths:
      - "ops/backup/**"
      - "ops/edge/**"
      - "web/**"
      - "compose.yaml"
      - ".github/workflows/backup-restore.yml"

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate Bash syntax
        run: bash -n ops/backup/nails-backup.sh

      - name: ShellCheck
        run: shellcheck --severity=warning ops/backup/nails-backup.sh

      - name: Verify retention boundaries
        run: |
          set -Eeuo pipefail
          root="$(mktemp -d)"
          trap 'rm -rf "$root"' EXIT

          touch "$root/nails-daily-current.sql.gz"
          touch -d '5 days ago' "$root/nails-daily-expired.sql.gz"
          touch "$root/nails-weekly-current.sql.gz"
          touch -d '21 days ago' "$root/nails-weekly-expired.sql.gz"
          touch "$root/nails-monthly-current.sql.gz"
          touch -d '366 days ago' "$root/nails-monthly-expired.sql.gz"
          touch "$root/current.log"
          touch -d '14 days ago' "$root/expired.log"
          mkdir "$root/hermes-local-patches"
          touch "$root/hermes-local-patches/keep.bak"

          NAILS_BACKUP_TEST_MODE=true \
          NAILS_BACKUP_ROOT="$root" \
            bash ops/backup/nails-backup.sh rotate

          test -f "$root/nails-daily-current.sql.gz"
          test ! -e "$root/nails-daily-expired.sql.gz"
          test -f "$root/nails-weekly-current.sql.gz"
          test ! -e "$root/nails-weekly-expired.sql.gz"
          test -f "$root/nails-monthly-current.sql.gz"
          test ! -e "$root/nails-monthly-expired.sql.gz"
          test -f "$root/current.log"
          test ! -e "$root/expired.log"
          test -f "$root/hermes-local-patches/keep.bak"
          echo 'BACKUP_RETENTION_CONTRACT_OK=true'

      - name: Enforce safety markers
        run: |
          python - <<'PY'
          from pathlib import Path

          script = Path("ops/backup/nails-backup.sh").read_text(encoding="utf-8")
          required = (
              "set -Eeuo pipefail",
              "umask 077",
              "pg_dump",
              "gzip -t",
              "createdb",
              "psql -v ON_ERROR_STOP=1",
              "dropdb --if-exists --force",
              "RESTORE_TEST_OK=true",
              "TELEGRAM_BACKUP_SENT=true",
              "15728640",
              "NAILS_BACKUP_TELEGRAM_CHAT_ID",
          )
          for marker in required:
              assert marker in script, f"backup contract lost marker: {marker}"
          assert "hermes-local-patches" not in script, (
              "generic backup rotation must never target hermes-local-patches"
          )
          print("BACKUP_SCRIPT_CONTRACT_OK=true")
          PY

      - name: Enforce WEB edge isolation
        run: |
          python - <<'PY'
          from pathlib import Path

          compose = Path("compose.yaml").read_text(encoding="utf-8")
          nginx = Path("web/nginx.conf").read_text(encoding="utf-8")
          disabled = Path("ops/edge/nails-web.Caddyfile").read_text(encoding="utf-8")
          enabled = Path("ops/edge/nails-web.enabled.Caddyfile").read_text(encoding="utf-8")

          required_compose = (
              '${NAILS_API_BIND:-127.0.0.1}:${NAILS_API_PORT:-8210}:8000',
              '${NAILS_WEB_BIND:-127.0.0.1}:${NAILS_WEB_PORT:-8220}:8080',
              'WEB_AUTH_ENABLED: ${WEB_AUTH_ENABLED:-false}',
              'WEB_TRUSTED_PROXY_CIDRS: ${WEB_TRUSTED_PROXY_CIDRS:-}',
          )
          for marker in required_compose:
              assert marker in compose, f"compose lost WEB isolation marker: {marker}"

          for marker in (
              "set_real_ip_from 172.18.0.1;",
              "real_ip_recursive off;",
              "limit_req zone=web_auth",
              "proxy_set_header X-Real-IP $remote_addr;",
              "proxy_set_header X-Forwarded-For $remote_addr;",
          ):
              assert marker in nginx, f"nginx lost edge marker: {marker}"
          assert "$proxy_add_x_forwarded_for" not in nginx
          assert "/api/v1/" not in nginx

          assert 'respond "web interface unavailable" 503' in disabled
          assert "reverse_proxy" not in disabled
          assert "@private_status path /web-health" in enabled
          assert "respond @private_status 404" in enabled
          assert "reverse_proxy 127.0.0.1:8220" in enabled
          assert "header_up X-Real-IP {remote_host}" in enabled
          assert "header_up X-Forwarded-For {remote_host}" in enabled

          print("WEB_EDGE_ISOLATION_CONTRACT_OK=true")
          PY
