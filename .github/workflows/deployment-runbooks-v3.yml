name: Deployment runbooks V3

on:
  push:
    branches: [main]
    paths:
      - "ops/deploy/nails-002e4-v3.sh"
      - "ops/deploy/README.md"
      - "docs/deployments/2026-07-13-nails-002e4-v2-rollback.md"
      - ".github/workflows/deployment-runbooks-v3.yml"
  pull_request:
    paths:
      - "ops/deploy/nails-002e4-v3.sh"
      - "ops/deploy/README.md"
      - "docs/deployments/2026-07-13-nails-002e4-v2-rollback.md"
      - ".github/workflows/deployment-runbooks-v3.yml"

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Validate V3 Bash syntax
        run: bash -n ops/deploy/nails-002e4-v3.sh

      - name: Validate V3 safety and rollback contract
        run: |
          python - <<'PY'
          import re
          from pathlib import Path

          path = Path("ops/deploy/nails-002e4-v3.sh")
          readme_path = Path("ops/deploy/README.md")
          incident_path = Path("docs/deployments/2026-07-13-nails-002e4-v2-rollback.md")

          text = path.read_text(encoding="utf-8")
          readme = readme_path.read_text(encoding="utf-8")
          incident = incident_path.read_text(encoding="utf-8")
          lines = text.splitlines()

          assert text.startswith("#!/usr/bin/env bash\n")
          assert "\r" not in text
          assert 'RUNBOOK_ID="NAILS-002E4-V3"' in text
          assert 'EXPECTED_BEFORE="5565a524b75a04fe5d8bc2c3e758d2994e9d9c12"' in text
          assert 'EXPECTED_FEATURE_ANCESTOR="77b6ca69286d7f2c203a85c04f4224f783038fdf"' in text
          assert 'EXPECTED_V2_ANCESTOR="b529b577fdaed5c8c1cfbcdbe24bce79a419004f"' in text
          assert 'RELEASE_SHA="${NAILS_RELEASE_SHA:-}"' in text
          assert 'git merge --ff-only "$RELEASE_SHA"' in text
          assert 'git -C "$REPO" reset --hard "$HEAD_BEFORE"' in text
          assert 'git cat-file -e "${RELEASE_SHA}:ops/deploy/nails-002e4-v3.sh"' in text

          assert 'USER_RUNTIME_DIR="/run/user/0"' in text
          assert 'XDG_RUNTIME_DIR="$USER_RUNTIME_DIR" systemctl --user "$@"' in text
          assert 'XDG_RUNTIME_DIR="$USER_RUNTIME_DIR" journalctl --user "$@"' in text
          assert 'GATEWAY_FRAGMENT="/root/.config/systemd/user/hermes-gateway-nails.service"' in text
          assert 'user_systemctl stop "$GATEWAY"' in text
          assert 'user_systemctl start "$GATEWAY"' in text
          assert re.search(r'^\s*systemctl\s+stop\s+"\$GATEWAY"', text, re.MULTILINE) is None
          assert re.search(r'^\s*systemctl\s+start\s+"\$GATEWAY"', text, re.MULTILINE) is None
          assert re.search(r'^\s*systemctl\s+restart\s+"\$GATEWAY"', text, re.MULTILINE) is None

          assert 'Hermes Agent v0.18.2 (2026.7.7.2)' in text
          assert 'discover_plugins()' in text
          assert 'discover_plugins(force=True)' not in text
          assert 'telegram_toolsets = set(_get_platform_tools(cfg, "telegram"))' in text
          assert 'assert telegram_toolsets == expected_telegram_toolsets' in text
          assert 'enabled_toolsets=sorted(telegram_toolsets)' in text
          assert 'Compare membership, never iteration order.' in text
          assert 'PLUGIN_REGISTRY_OK=true' in text
          assert 'TELEGRAM_VISIBILITY_OK=true' in text
          assert 'enabled user 0.5.0 nails-onboarding' in text
          assert 'enabled user 0.1.0 nails-scheduling' in text

          assert 'yaml.safe_load' in text
          assert 'yaml.safe_dump' in text
          assert 'os.replace(temp_name, path)' in text
          assert 'CONFIG_UPDATED_ATOMICALLY=true' in text
          assert 'plugins.get("enabled") == ["nails-onboarding"]' in text
          assert '"nails-onboarding",\n    "nails-scheduling",' in text
          assert '"nails_onboarding",\n    "nails_scheduling",' in text

          assert 'cp -a "$PROFILE_CONFIG" "${BACKUP_DIR}/config.before"' in text
          assert 'MUTATION_STARTED="false"' in text
          assert 'if [[ "$MUTATION_STARTED" != "true" ]]' in text
          assert 'ROLLBACK_PERFORMED=false' in text
          assert 'ROLLBACK_REASON=no-production-mutation-started' in text
          assert 'restore_runtime_from_backup' in text
          assert 'ROLLBACK_PERFORMED=true' in text

          assert 'backend_api_container_unchanged=true' in text
          assert 'backend_db_container_unchanged=true' in text
          assert 'docker_daemon_unchanged=true' in text
          assert 'migration_executed=false' in text
          assert 'database_write_executed=false' in text
          assert 'backend_restart_executed=false' in text
          assert 'NAILS_002E4_V3_DEPLOYMENT_OK' in text

          forbidden = (
              "git push",
              "git commit",
              "git checkout -b",
              "git switch -c",
              "gh pr",
              "gh issue",
              "docker compose up",
              "docker compose restart",
              "docker restart",
              "alembic upgrade",
              "psql ",
              "plugins enable",
              "plugins disable",
              "plugins install",
              "plugins remove",
          )
          for snippet in forbidden:
              assert snippet not in text, f"forbidden deployment operation: {snippet}"

          expected_release_files = {
              "__init__.py",
              "operations.py",
              "plugin.yaml",
              "presenters.py",
              "schemas.py",
              "tools.py",
              "transport.py",
              "validation.py",
          }
          start = lines.index("RELEASE_FILES=(") + 1
          end = lines.index(")", start)
          actual_release_files = {
              line.strip().strip('"')
              for line in lines[start:end]
              if line.strip()
          }
          assert actual_release_files == expected_release_files

          snippets = []
          index = 0
          while index < len(lines):
              if "<<'PY'" not in lines[index]:
                  index += 1
                  continue
              index += 1
              snippet = []
              while index < len(lines) and lines[index] != "PY":
                  snippet.append(lines[index])
                  index += 1
              assert index < len(lines), "unterminated embedded Python heredoc"
              snippets.append("\n".join(snippet) + "\n")
              index += 1

          assert len(snippets) == 10
          for number, snippet in enumerate(snippets, start=1):
              compile(snippet, f"embedded-python-{number}", "exec")

          assert "ops/deploy/nails-002e4-v3.sh" in readme
          assert "NAILS_002E4_V3_DEPLOYMENT_OK" in readme
          assert "nails-002e4-v2.sh` must **not** be executed again" in readme
          assert "discover_plugins()` and never with `force=True" in readme
          assert "compared by exact membership, not iteration order" in readme
          assert "ROLLBACK_GATEWAY_STATE=active" in readme

          assert "CONFIG_UPDATED_ATOMICALLY=true" in incident
          assert "PLUGIN_LIST_OK=true" in incident
          assert "set-like, unordered collection" in incident
          assert "discover_plugins(force=True)" in incident
          assert "ROLLBACK_PERFORMED=true" in incident
          assert "ROLLBACK_GATEWAY_STATE=active" in incident
          assert "V2 is permanently blocked" in incident

          print("DEPLOYMENT_RUNBOOK_V3_CONTRACT_OK")
          PY
