name: Production infrastructure contract

on:
  push:
    branches: [main]
    paths:
      - "AGENTS.md"
      - "README.md"
      - "docs/context/current.md"
      - "docs/status.md"
      - "docs/operations/production-infrastructure.md"
      - "docs/operations/hermes-plugin-runtime.md"
      - "ops/deploy/README.md"
      - ".github/workflows/production-infrastructure-contract.yml"
  pull_request:
    paths:
      - "AGENTS.md"
      - "README.md"
      - "docs/context/current.md"
      - "docs/status.md"
      - "docs/operations/production-infrastructure.md"
      - "docs/operations/hermes-plugin-runtime.md"
      - "ops/deploy/README.md"
      - ".github/workflows/production-infrastructure-contract.yml"

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Validate production infrastructure source of truth
        run: |
          python - <<'PY'
          from pathlib import Path

          paths = {
              "context": Path("docs/context/current.md"),
              "status": Path("docs/status.md"),
              "infra": Path("docs/operations/production-infrastructure.md"),
              "plugin": Path("docs/operations/hermes-plugin-runtime.md"),
              "agents": Path("AGENTS.md"),
              "readme": Path("README.md"),
              "deploy": Path("ops/deploy/README.md"),
          }
          for path in paths.values():
              assert path.is_file(), f"missing required file: {path}"
          text = {name: path.read_text(encoding="utf-8") for name, path in paths.items()}

          required_infra = (
              "de.funti.cc",
              "/opt/nails/repo",
              "/opt/nails/.env",
              "http://127.0.0.1:8210",
              "/root/.hermes/profiles/nails",
              "/root/.hermes/profiles/nails/config.yaml",
              "/root/.config/systemd/user/hermes-gateway-nails.service",
              "/usr/local/lib/hermes-agent/venv/bin/python",
              "-m hermes_cli.main --profile nails gateway run",
              "XDG_RUNTIME_DIR=/run/user/0 systemctl --user",
              "root user-level systemd",
              "Hermes is **not** running in Docker",
              "long polling",
              "must not search for or replace an assumed comma-separated allowlist string",
              "PIDs are transient",
              "while `MainPID=0`",
              "385a92962e3736553335d717adcdf4b83ac8a8b3",
              "Alembic: 0006",
              "NAILS_002E4_V3_DEPLOYMENT_OK",
          )
          for item in required_infra:
              assert item in text["infra"], f"missing infrastructure fact: {item}"

          required_plugin = (
              "Hermes Agent v0.18.2 (2026.7.7.2)",
              "/usr/local/lib/hermes-agent/venv/bin/hermes",
              "/root/.hermes/profiles/nails/plugins",
              "plugins.enabled",
              "plugin key: nails-onboarding",
              "plugin key: nails-scheduling",
              "tool name: nails_onboarding",
              "tool name: nails_scheduling",
              "platform_toolsets",
              "nails-onboarding\n    - nails-scheduling",
              "nails_onboarding\n    - nails_scheduling",
              "must not rely on that implicit behavior",
              "discover_plugins(force=True)",
              "set-like unordered collection",
              "enabled user 0.1.0 nails-scheduling",
              "enabled user 0.2.0 nails-scheduling",
              "resolve_date",
              "update_availability",
              "PLUGIN_REGISTRY_OK=true",
              "TELEGRAM_VISIBILITY_OK=true",
              "SCHEDULING_ACTIONS_OK=true",
          )
          for item in required_plugin:
              assert item in text["plugin"], f"missing plugin runtime fact: {item}"

          required_context = (
              "production HEAD: 385a92962e3736553335d717adcdf4b83ac8a8b3",
              "Alembic: 0006",
              "NAILS_002E4_V3_DEPLOYMENT_OK",
              "Issue #34",
              "PR #44",
              "c9e400c80398bd4367aad0ed0416ee0fc6a79b2d",
              "Что у меня 18 июля?",
              "ops/nails-002e5-date-availability",
              "NAILS_002E5_DEPLOYMENT_OK",
              "calendar_data_changed_by_deployment=false",
              "manual_sql_executed=false",
              "V1 или V2",
          )
          for item in required_context:
              assert item in text["context"], f"missing current context fact: {item}"

          required_status = (
              "HEAD: 385a92962e3736553335d717adcdf4b83ac8a8b3",
              "Alembic | `0006`",
              "NAILS_002E4_V3_DEPLOYMENT_OK",
              "Issue #34",
              "PR #44 merged",
              "candidate `0.2.0`",
              "NAILS-002E5",
          )
          for item in required_status:
              assert item in text["status"], f"missing status fact: {item}"

          forbidden = (
              "TELEGRAM_BOT_TOKEN=",
              "INTERNAL_API_KEY=",
              "NAILS_INTERNAL_API_KEY=",
              "DATABASE_URL=postgres",
              "Authorization: Bearer",
          )
          for item in forbidden:
              for name in ("context", "status", "infra", "plugin"):
                  assert item not in text[name], f"secret-like value in {name}: {item}"

          required_links = (
              "docs/context/current.md",
              "docs/operations/production-infrastructure.md",
              "docs/operations/hermes-plugin-runtime.md",
          )
          for link in required_links:
              assert link in text["agents"], f"missing AGENTS link: {link}"
              assert link in text["readme"], f"missing README link: {link}"

          assert "сначала прочитать `docs/context/current.md`" in text["agents"]
          assert "Нельзя заново угадывать" in text["agents"]

          deploy_required = (
              "nails-002e4.sh` must **not** be executed again",
              "nails-002e4-v2.sh` must **not** be executed again",
              "ops/deploy/nails-002e4-v3.sh",
              "NAILS_002E4_V3_DEPLOYMENT_OK",
              "ops/deploy/nails-002e5-date-availability.sh",
              "NAILS_002E5_DEPLOYMENT_OK",
              "root user-level systemd",
              "/root/.hermes/profiles/nails/config.yaml",
              "<APPROVED_RUNBOOK>.sh",
              "calendar_data_changed_by_deployment=false",
              "manual_sql_executed=false",
          )
          for item in deploy_required:
              assert item in text["deploy"], f"missing deployment contract: {item}"

          print("PRODUCTION_INFRASTRUCTURE_AND_E5_CONTEXT_CONTRACT_OK")
          PY
