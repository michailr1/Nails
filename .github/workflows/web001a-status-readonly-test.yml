name: WEB-001A read-only status test
on:
  push:
    branches: [feat/web001a-auth-session]
permissions:
  contents: write
jobs:
  patch:
    if: ${{ !contains(github.event.head_commit.message, '[status-readonly-test]') }}
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feat/web001a-auth-session
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Append focused test
        run: |
          python - <<'PY'
          from pathlib import Path
          path = Path('backend/tests/test_web_auth.py')
          text = path.read_text()
          addition = '''

          def test_status_reports_expiry_without_mutating_challenge(client, clean_database):
              from datetime import UTC, datetime, timedelta

              created = client.post(
                  "/web/api/auth/challenges",
                  headers=WEB_ORIGIN_HEADERS,
              )
              assert created.status_code == 201
              challenge_id = created.json()["challenge_id"]
              with get_session_factory()() as session:
                  challenge = session.get(WebLoginChallenge, challenge_id)
                  assert challenge is not None
                  challenge.expires_at = datetime.now(UTC) - timedelta(seconds=1)
                  session.commit()

              path = f"/web/api/auth/challenges/{challenge_id}"
              response = client.get(path, headers=WEB_ORIGIN_HEADERS)
              assert response.status_code == 200
              assert response.json()["status"] == "expired"

              with get_session_factory()() as session:
                  challenge = session.get(WebLoginChallenge, challenge_id)
                  assert challenge is not None
                  assert challenge.status == "pending"
          '''
          path.write_text(text + addition)
          PY
          rm .github/workflows/web001a-status-readonly-test.yml
      - name: Format and push
        run: |
          python -m pip install 'ruff>=0.9,<1'
          ruff check --fix backend/tests/test_web_auth.py backend/app/api/web_auth.py backend/app/services/web_auth_limits.py
          ruff check backend/tests/test_web_auth.py backend/app/api/web_auth.py backend/app/services/web_auth_limits.py
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add backend/tests/test_web_auth.py backend/app/api/web_auth.py backend/app/services/web_auth_limits.py .github/workflows/web001a-status-readonly-test.yml
          git diff --cached --check
          git commit -m 'test: verify GET status is read-only [status-readonly-test]'
          git push origin HEAD:feat/web001a-auth-session
