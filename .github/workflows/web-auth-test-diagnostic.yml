name: WEB auth test diagnostic
on:
  push:
    branches: [feat/web001a-auth-session]
permissions:
  contents: write
jobs:
  diagnose:
    if: ${{ !contains(github.event.head_commit.message, '[diag-done]') }}
    runs-on: ubuntu-24.04
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_DB: nails_test
          POSTGRES_USER: nails_app
          POSTGRES_HOST_AUTH_METHOD: trust
        ports: [55432:5432]
        options: >-
          --health-cmd "pg_isready -U nails_app -d nails_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 12
    env:
      APP_TIMEZONE: Europe/Berlin
      INTERNAL_API_KEY: ${{ github.sha }}
      DATABASE_URL: postgresql+psycopg://nails_app@127.0.0.1:55432/nails_test
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feat/web001a-auth-session
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - working-directory: backend
        run: python -m pip install -e '.[dev]'
      - working-directory: backend
        run: alembic upgrade head
      - working-directory: backend
        run: |
          set +e
          pytest -q tests/test_web_auth.py > ../web-auth-test-output.txt 2>&1
          tail -n 140 ../web-auth-test-output.txt > ../web-auth-test-summary.txt
      - run: |
          rm .github/workflows/web-auth-test-diagnostic.yml web-auth-test-output.txt
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add web-auth-test-summary.txt .github/workflows/web-auth-test-diagnostic.yml
          git commit -m 'ci: record WEB auth test summary [diag-done]'
          git push origin HEAD:feat/web001a-auth-session
