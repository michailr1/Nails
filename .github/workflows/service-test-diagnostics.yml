name: Service test diagnostics

on:
  pull_request:
    paths:
      - "backend/**"
      - "hermes/plugins/nails_scheduling/**"
      - "hermes/skills/**"
      - ".github/workflows/service-test-diagnostics.yml"

permissions:
  contents: read

jobs:
  scheduling-plugin:
    runs-on: ubuntu-latest
    steps:
      - name: Run first failing scheduling test with compact output
        env:
          GH_TOKEN: ${{ github.token }}
          PYTHONPATH: hermes/plugins
        run: |
          curl --fail --silent --show-error --location \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}/tarball/${GITHUB_SHA}" \
            | tar -xz --strip-components=1
          python -m pip install --quiet httpx pytest pyyaml
          pytest -q -x --tb=short hermes/plugins/nails_scheduling/tests
