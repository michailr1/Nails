name: Service test diagnostics

on:
  pull_request:
    paths:
      - "backend/**"
      - "hermes/plugins/nails_scheduling/**"
      - "hermes/skills/**"
      - ".github/workflows/service-test-diagnostics.yml"

permissions:
  contents: read

jobs:
  scheduling-plugin:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: python -m pip install --quiet httpx pytest pyyaml
      - env:
          PYTHONPATH: hermes/plugins
        run: >-
          pytest -q -x --tb=short
          hermes/plugins/nails_scheduling/tests
