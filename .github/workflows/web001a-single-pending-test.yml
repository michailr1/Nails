name: WEB-001A single pending test
on:
  push:
    branches: [feat/web001a-auth-session]
permissions:
  contents: write
jobs:
  patch:
    if: ${{ !contains(github.event.head_commit.message, '[single-pending-test]') }}
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feat/web001a-auth-session
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Append focused test
        run: |
          python - <<'PY'
          from pathlib import Path
          path = Path('backend/tests/test_web_auth.py')
          text = path.read_text()
          addition = '''

          def test_only_one_pending_challenge_per_browser(client, clean_database):
              first = _start(client)
              second = _start(client)

              with get_session_factory()() as session:
                  first_row = session.get(WebLoginChallenge, first["challenge_id"])
                  second_row = session.get(WebLoginChallenge, second["challenge_id"])
                  assert first_row is not None
                  assert second_row is not None
                  assert first_row.status == "denied"
                  assert second_row.status == "pending"
                  pending = session.scalars(
                      select(WebLoginChallenge).where(
                          WebLoginChallenge.status == "pending"
                      )
                  ).all()
                  assert len(pending) == 1
          '''
          path.write_text(text + addition)
          PY
          rm .github/workflows/web001a-single-pending-test.yml
      - name: Format and push
        run: |
          python -m pip install 'ruff>=0.9,<1'
          ruff check --fix backend/tests/test_web_auth.py backend/app/api/web_auth.py backend/app/services/web_auth_limits.py
          ruff check backend/tests/test_web_auth.py backend/app/api/web_auth.py backend/app/services/web_auth_limits.py
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add backend/tests/test_web_auth.py backend/app/api/web_auth.py backend/app/services/web_auth_limits.py .github/workflows/web001a-single-pending-test.yml
          git diff --cached --check
          git commit -m 'test: enforce one pending challenge per browser [single-pending-test]'
          git push origin HEAD:feat/web001a-auth-session
