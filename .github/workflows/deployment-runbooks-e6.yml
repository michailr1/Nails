name: Deployment runbooks E6

on:
  push:
    branches: [main]
    paths:
      - "ops/deploy/nails-002e6-combined-operations.sh"
      - "ops/deploy/lib/nails-002e6-runtime.sh"
      - "ops/deploy/lib/nails-002e5-common.sh"
      - "ops/deploy/README.md"
      - "docs/deployments/2026-07-14-nails-002e6-plan.md"
      - "hermes/skills/nails-scheduling/SKILL.md"
      - ".github/workflows/deployment-runbooks-e6.yml"
  pull_request:
    paths:
      - "ops/deploy/nails-002e6-combined-operations.sh"
      - "ops/deploy/lib/nails-002e6-runtime.sh"
      - "ops/deploy/lib/nails-002e5-common.sh"
      - "ops/deploy/README.md"
      - "docs/deployments/2026-07-14-nails-002e6-plan.md"
      - "hermes/skills/nails-scheduling/SKILL.md"
      - ".github/workflows/deployment-runbooks-e6.yml"

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate Bash syntax
        run: |
          bash -n ops/deploy/nails-002e6-combined-operations.sh
          bash -n ops/deploy/lib/nails-002e6-runtime.sh
          bash -n ops/deploy/lib/nails-002e5-common.sh

      - name: Validate E6 deployment contract
        run: |
          python - <<'PY'
          from pathlib import Path

          entry = Path("ops/deploy/nails-002e6-combined-operations.sh").read_text(encoding="utf-8")
          runtime = Path("ops/deploy/lib/nails-002e6-runtime.sh").read_text(encoding="utf-8")
          common = Path("ops/deploy/lib/nails-002e5-common.sh").read_text(encoding="utf-8")
          skill = Path("hermes/skills/nails-scheduling/SKILL.md").read_text(encoding="utf-8")
          combined = "\n".join((entry, runtime, common))

          assert entry.startswith("#!/usr/bin/env bash\n")
          assert "set -Eeuo pipefail" in entry
          assert 'RELEASE_SHA="${NAILS_RELEASE_SHA:-}"' in entry
          assert "ops/deploy/lib/nails-002e6-runtime.sh" in entry
          assert "nails_002e6_main" in entry

          required_runtime = (
              'RUNBOOK_ID="NAILS-002E6"',
              'BASELINE_E4="385a92962e3736553335d717adcdf4b83ac8a8b3"',
              'BASELINE_E5="a0ef8c5c26301a9f6950544afd0e070b7e691582"',
              'EXPECTED_CODE_ANCESTOR="06d68faf69eb6828360c1ccc9b0d8c83e14a0eb9"',
              'PRE_PLUGIN_VERSION="0.1.0"',
              'PRE_PLUGIN_VERSION="0.2.0"',
              'API_ROLLBACK_IMAGE_REF="nails-api-rollback:${STAMP}"',
              'API_BUILD_LOG="${RUNTIME_BACKUP}/api-build.log"',
              'verify_plugin_list "$PRE_PLUGIN_VERSION"',
              'verify_plugin_list "0.3.0"',
              'git merge --ff-only --quiet "$RELEASE_SHA"',
              'git diff --quiet "$HEAD_BEFORE" "$RELEASE_SHA" -- backend/alembic',
              "compose exec -T nails-db",
              "pg_dump --no-owner --no-acl",
              'docker image tag "$API_IMAGE_ID_BEFORE" "$API_ROLLBACK_IMAGE_REF"',
              'compose build nails-api >"$API_BUILD_LOG" 2>&1',
              'docker image inspect -f \'{{.Id}}\' "$API_IMAGE_REF_BEFORE"',
              'docker image inspect -f \'{{.Id}}\' "$API_ROLLBACK_IMAGE_REF"',
              "compose up -d --no-deps --force-recreate --no-build nails-api >/dev/null",
              'API_IMAGE_ID_AFTER="$(docker inspect -f \'{{.Image}}\' "$API_CONTAINER_AFTER")"',
              'docker image rm "$API_ROLLBACK_IMAGE_REF"',
              'user_systemctl stop "$GATEWAY"',
              'user_systemctl start "$GATEWAY"',
              'cmp -s "$PROFILE_CONFIG" "${RUNTIME_BACKUP}/config.before"',
              '"/api/v1/scheduling/date/resolve"',
              '"/api/v1/scheduling/availability"',
              '"/api/v1/scheduling/services"',
              '"/api/v1/scheduling/services/exact"',
              '"/api/v1/onboarding/preferences"',
              '"/api/v1/onboarding/preferences/name"',
              '"/api/v1/onboarding/preferences/style"',
              '"/api/v1/onboarding/preferences/default-work-hours"',
              '"resolve_date"',
              '"update_availability"',
              '"find_service"',
              '"create_service"',
              '"update_service"',
              '"get_master_preferences"',
              '"save_master_name"',
              '"save_master_style"',
              '"save_default_work_hours"',
              "MASTER_PREFERENCES_SKILL_OK=true",
              "MASTER_PREFERENCES_ACTIONS_OK=true",
              "NAILS_002E6_DEPLOYMENT_OK",
              "api_image_changed=true",
              "rollback_image_preserved_during_build=true",
              "schema_revision_changed=false",
              "db_container_unchanged=true",
              "docker_daemon_unchanged=true",
              "calendar_data_changed_by_deployment=false",
              "service_data_changed_by_deployment=false",
              "master_preferences_data_changed_by_deployment=false",
              "manual_sql_executed=false",
          )
          for item in required_runtime:
              assert item in runtime, item

          required_skill = (
              "## Настройки мастера",
              "не вызывай save-действие до подтверждения",
              "Для «ты/вы» не меняй базовый `assistant_style`",
              "сохрани остальные пользовательские детали",
              "не придумывай время окончания",
              "возвращённое значение совпадает с подтверждённым будущим состоянием",
          )
          for item in required_skill:
              assert item in skill, item

          required_common = (
              'XDG_RUNTIME_DIR="$USER_RUNTIME_DIR" systemctl --user',
              'XDG_RUNTIME_DIR="$USER_RUNTIME_DIR" journalctl --user',
              "discover_plugins()",
              'telegram_toolsets = set(_get_platform_tools(cfg, "telegram"))',
              'git -C "$REPO" reset --hard "$HEAD_BEFORE"',
              'docker image tag "$API_IMAGE_ID_BEFORE" "$API_IMAGE_REF_BEFORE"',
              "restore_runtime",
              "ROLLBACK_PERFORMED=true",
              "wait_api",
              "verify_alembic_0006",
          )
          for item in required_common:
              assert item in common, item
          assert "discover_plugins(force=True)" not in common

          forbidden = (
              "docker compose down",
              "compose down",
              "docker restart",
              "compose restart",
              "compose up -d nails-db",
              "compose images -q",
              "alembic downgrade",
              "psql ",
              "DELETE FROM",
              "UPDATE services",
              "INSERT INTO services",
              "UPDATE availability_intervals",
              "INSERT INTO availability_intervals",
              "UPDATE master_preferences",
              "INSERT INTO master_preferences",
              "plugins enable",
              "plugins disable",
              "git push",
              "git commit",
              "gh pr",
              "gh issue",
              "nails_scheduling(",
              "nails_onboarding(",
          )
          for snippet in forbidden:
              assert snippet not in combined, f"forbidden operation: {snippet}"

          expected_files = {
              "__init__.py",
              "operations.py",
              "plugin.yaml",
              "presenters.py",
              "schemas.py",
              "tools.py",
              "transport.py",
              "validation.py",
          }
          lines = common.splitlines()
          start = lines.index("PLUGIN_FILES=(") + 1
          end = lines.index(")", start)
          actual_files = {
              line.strip().strip('"')
              for line in lines[start:end]
              if line.strip()
          }
          assert actual_files == expected_files

          def heredocs(text: str) -> list[str]:
              lines = text.splitlines()
              snippets = []
              index = 0
              while index < len(lines):
                  if "<<'PY'" not in lines[index]:
                      index += 1
                      continue
                  index += 1
                  snippet = []
                  while index < len(lines) and lines[index] != "PY":
                      snippet.append(lines[index])
                      index += 1
                  assert index < len(lines), "unterminated Python heredoc"
                  snippets.append("\n".join(snippet) + "\n")
                  index += 1
              return snippets

          snippets = heredocs(runtime)
          assert len(snippets) == 3, len(snippets)
          for number, snippet in enumerate(snippets, start=1):
              compile(snippet, f"e6-embedded-python-{number}", "exec")

          print("DEPLOYMENT_RUNBOOK_E6_CONTRACT_OK")
          PY
