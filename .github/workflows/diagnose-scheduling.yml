name: Diagnose scheduling tests

on:
  pull_request:

permissions:
  contents: read

jobs:
  diagnose:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install test dependencies
        run: python -m pip install httpx pytest pyyaml
      - name: Run tests with JUnit output
        env:
          PYTHONPATH: hermes/plugins
        run: >-
          pytest -q
          --junitxml=scheduling-results.xml
          hermes/plugins/nails_scheduling/tests
      - name: Upload diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: scheduling-results
          path: scheduling-results.xml
          if-no-files-found: error
