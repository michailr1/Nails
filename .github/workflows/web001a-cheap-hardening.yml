name: WEB-001A cheap hardening
on:
  push:
    branches: [feat/web001a-auth-session]
permissions:
  contents: write
jobs:
  patch:
    if: ${{ !contains(github.event.head_commit.message, '[cheap-hardening]') }}
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feat/web001a-auth-session
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Apply race-safe bucket and tests
        run: |
          python - <<'PY'
          from pathlib import Path

          service = Path('backend/app/services/web_auth.py')
          text = service.read_text()
          text = text.replace(
              'from sqlalchemy import select\n',
              'from sqlalchemy import select\nfrom sqlalchemy.dialects.postgresql import insert as pg_insert\n',
              1,
          )
          old = '''    bucket = session.scalar(
              select(WebAuthRateBucket)
              .where(
                  WebAuthRateBucket.action == action,
                  WebAuthRateBucket.scope_hash == scope_hash,
              )
              .with_for_update()
          )
          if bucket is None:
              session.add(
                  WebAuthRateBucket(
                      action=action,
                      scope_hash=scope_hash,
                      window_started_at=now,
                      count=1,
                  )
              )
              return True

          if now >= bucket.window_started_at + timedelta(seconds=window_seconds):
'''
          new = '''    session.execute(
              pg_insert(WebAuthRateBucket)
              .values(
                  action=action,
                  scope_hash=scope_hash,
                  window_started_at=now,
                  count=0,
              )
              .on_conflict_do_nothing(
                  index_elements=["action", "scope_hash"],
              )
          )
          bucket = session.scalar(
              select(WebAuthRateBucket)
              .where(
                  WebAuthRateBucket.action == action,
                  WebAuthRateBucket.scope_hash == scope_hash,
              )
              .with_for_update()
          )
          if bucket is None:
              raise RuntimeError("rate bucket upsert did not produce a row")

          if now >= bucket.window_started_at + timedelta(seconds=window_seconds):
'''
          if old not in text:
              raise SystemExit('rate bucket anchor missing')
          service.write_text(text.replace(old, new, 1))

          tests = Path('backend/tests/test_web_auth.py')
          text = tests.read_text()
          text = text.replace(
              '    assert denied.status_code == 403\n',
              '    assert denied.status_code == 200\n    assert denied.json() == {"approved": False}\n',
              1,
          )
          addition = '''

          def test_web_approval_identity_failures_are_neutral(
              client,
              create_user,
              auth_headers,
          ):
              unknown = _approve(client, auth_headers, "000000", telegram_user_id=999999999)
              assert unknown.status_code == 200
              assert unknown.json() == {"approved": False}

              create_user(telegram_user_id=100000002, is_active=False)
              inactive = _approve(client, auth_headers, "000000", telegram_user_id=100000002)
              assert inactive.status_code == 200
              assert inactive.json() == {"approved": False}


          def test_invalid_session_response_clears_cookie(client, clean_database):
              client.cookies.set("__Host-nails_session", "invalid-token")
              response = client.get(
                  "/web/api/auth/session",
                  headers=WEB_ORIGIN_HEADERS,
              )
              assert response.status_code == 401
              cookie_headers = response.headers.get_list("set-cookie")
              assert any(
                  "__Host-nails_session=" in value and "Max-Age=0" in value
                  for value in cookie_headers
              )


          def test_rate_bucket_first_insert_is_idempotent(client, clean_database):
              first = client.post(
                  "/web/api/auth/challenges",
                  headers=WEB_ORIGIN_HEADERS,
              )
              second = client.post(
                  "/web/api/auth/challenges",
                  headers=WEB_ORIGIN_HEADERS,
              )
              assert first.status_code == 201
              assert second.status_code == 201
          '''
          tests.write_text(text + addition)
          PY
          rm .github/workflows/web001a-cheap-hardening.yml
      - name: Format and push
        run: |
          python -m pip install 'ruff>=0.9,<1'
          ruff check --fix backend/app/services/web_auth.py backend/app/api/web_auth.py backend/app/web_auth_identity.py backend/tests/test_web_auth.py
          ruff check backend/app/services/web_auth.py backend/app/api/web_auth.py backend/app/web_auth_identity.py backend/tests/test_web_auth.py
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add backend/app/services/web_auth.py backend/app/api/web_auth.py backend/app/web_auth_identity.py backend/tests/test_web_auth.py .github/workflows/web001a-cheap-hardening.yml
          git diff --cached --check
          git commit -m 'fix: complete cheap WEB auth hardening [cheap-hardening]'
          git push origin HEAD:feat/web001a-auth-session
