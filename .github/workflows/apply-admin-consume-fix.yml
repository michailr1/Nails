name: Apply admin consume fix

on:
  push:
    branches: [feat/admin-master-management]

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feat/admin-master-management
      - name: Update session user role gates
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path('backend/app/services/web_auth.py')
          content = path.read_text(encoding='utf-8')
          replacements = {
              '''            User.id == challenge.user_id,
              User.is_active.is_(True),
              User.role == UserRole.master,
  ''': '''            User.id == challenge.user_id,
              User.is_active.is_(True),
              User.role.in_({UserRole.master, UserRole.admin}),
  ''',
              '''            User.id == web_session.user_id,
              User.is_active.is_(True),
              User.role == UserRole.master,
  ''': '''            User.id == web_session.user_id,
              User.is_active.is_(True),
              User.role.in_({UserRole.master, UserRole.admin}),
  ''',
          }
          changed = False
          for old, new in replacements.items():
              if old in content:
                  content = content.replace(old, new, 1)
                  changed = True
              elif new not in content:
                  raise SystemExit('expected web session role gate not found')
          if changed:
              path.write_text(content, encoding='utf-8')
          PY
      - name: Commit fix when needed
        run: |
          if git diff --quiet; then
            exit 0
          fi
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add backend/app/services/web_auth.py
          git commit -m 'feat(auth): allow admin web sessions'
          git push origin HEAD:feat/admin-master-management
