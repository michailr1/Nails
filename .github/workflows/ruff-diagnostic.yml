name: Ruff diagnostic

on:
  pull_request:

permissions:
  contents: read

jobs:
  ruff-diagnostic:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/pyproject.toml
      - name: Install Ruff
        run: python -m pip install 'ruff>=0.9,<1'
      - name: Capture Ruff fix
        shell: bash
        run: |
          cp tests/test_web_glam_foundation_contract.py ../before.py
          ruff check --fix tests/test_web_glam_foundation_contract.py
          cp tests/test_web_glam_foundation_contract.py ../after.py
          diff -u ../before.py ../after.py > ../ruff-fix.diff || true
          cat ../ruff-fix.diff
      - uses: actions/upload-artifact@v4
        with:
          name: ruff-diagnostic
          path: |
            before.py
            after.py
            ruff-fix.diff
          if-no-files-found: error
