name: Ruff diagnostic

on:
  pull_request:

permissions:
  contents: read

jobs:
  ruff:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install Ruff
        run: pip install --quiet 'ruff>=0.9,<1'
      - name: Ruff
        run: ruff check . --output-format=concise
