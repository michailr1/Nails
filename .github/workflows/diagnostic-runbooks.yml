name: Diagnostic runbooks

on:
  push:
    branches: [main]
    paths:
      - "ops/diagnostics/**"
      - ".github/workflows/diagnostic-runbooks.yml"
  pull_request:
    paths:
      - "ops/diagnostics/**"
      - ".github/workflows/diagnostic-runbooks.yml"

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Validate diagnostic syntax and read-only boundary
        run: |
          bash -n ops/diagnostics/gateway-nails-preflight.sh
          bash -n ops/diagnostics/hermes-runtime-discovery.sh

          python - <<'PY'
          from pathlib import Path

          script_paths = sorted(Path("ops/diagnostics").glob("*.sh"))
          assert {path.name for path in script_paths} == {
              "gateway-nails-preflight.sh",
              "hermes-runtime-discovery.sh",
          }

          forbidden = (
              "systemctl start",
              "systemctl stop",
              "systemctl restart",
              "systemctl enable",
              "systemctl disable",
              "systemctl reset-failed",
              "service start",
              "service stop",
              "service restart",
              "git merge",
              "git reset",
              "git checkout",
              "git switch",
              "git push",
              "git commit",
              "docker compose up",
              "docker compose restart",
              "docker restart",
              "docker start",
              "docker stop",
              "docker rm",
              "docker exec",
              "alembic",
              "psql ",
              "rm -",
              "cp -",
              "mv ",
              "install -",
              "sed -i",
              "tee ",
              "touch ",
              "mkdir ",
              "chmod ",
              "chown ",
              "truncate ",
              "kill ",
              "pkill ",
          )

          marker = "python3 /dev/fd/3 3<<'PY'\n"
          for script_path in script_paths:
              text = script_path.read_text(encoding="utf-8")
              assert text.startswith("#!/usr/bin/env bash\n")
              assert "\r" not in text
              assert 'DIAGNOSTIC_SHA="${NAILS_DIAGNOSTIC_SHA:-}"' in text
              assert "changes_executed=false" in text

              for snippet in forbidden:
                  assert snippet not in text, (
                      f"forbidden diagnostic mutation in {script_path}: {snippet}"
                  )

              assert text.count(marker) == 1
              python_source = text.split(marker, 1)[1].split("\nPY\n", 1)[0]
              compile(python_source, f"{script_path.name}-sanitizer", "exec")

          preflight = Path(
              "ops/diagnostics/gateway-nails-preflight.sh"
          ).read_text(encoding="utf-8")
          assert 'RUNBOOK_ID="NAILS-GATEWAY-PREFLIGHT-DIAGNOSTIC"' in preflight
          assert 'GATEWAY="hermes-gateway-nails.service"' in preflight
          assert "SANITIZED_GATEWAY_LOG_TAIL_BEGIN" in preflight
          assert "SANITIZED_GATEWAY_LOG_TAIL_END" in preflight

          discovery = Path(
              "ops/diagnostics/hermes-runtime-discovery.sh"
          ).read_text(encoding="utf-8")
          assert 'RUNBOOK_ID="NAILS-HERMES-RUNTIME-DISCOVERY"' in discovery
          assert "SYSTEM_SYSTEMD_LOADED_SERVICES" in discovery
          assert "ROOT_USER_SYSTEMD_LOADED_SERVICES" in discovery
          assert "CANDIDATE_UNIT_FILES_AND_CONTENT" in discovery
          assert "MATCHING_PROCESSES" in discovery
          assert "MATCHING_DOCKER_CONTAINERS" in discovery
          assert "ROOT_CRONTAB_MATCHES" in discovery
          assert "RECENT_GLOBAL_JOURNAL_MATCHES" in discovery
          assert "NAILS_HERMES_RUNTIME_DISCOVERY_END" in discovery

          readme = Path("ops/diagnostics/README.md").read_text(encoding="utf-8")
          assert "must be read-only" in readme
          assert "The VPS agent only executes" in readme
          assert (
              'git show "${NAILS_DIAGNOSTIC_SHA}:'
              'ops/diagnostics/gateway-nails-preflight.sh" | bash'
          ) in readme
          assert (
              'git show "${NAILS_DIAGNOSTIC_SHA}:'
              'ops/diagnostics/hermes-runtime-discovery.sh" | bash'
          ) in readme

          print("DIAGNOSTIC_RUNBOOK_CONTRACT_OK")
          PY
