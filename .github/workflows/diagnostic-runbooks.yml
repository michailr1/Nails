name: Diagnostic runbooks

on:
  push:
    branches: [main]
    paths:
      - "ops/diagnostics/**"
      - ".github/workflows/diagnostic-runbooks.yml"
  pull_request:
    paths:
      - "ops/diagnostics/**"
      - ".github/workflows/diagnostic-runbooks.yml"

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Validate diagnostic syntax and read-only boundary
        run: |
          bash -n ops/diagnostics/gateway-nails-preflight.sh

          python - <<'PY'
          from pathlib import Path

          script_path = Path("ops/diagnostics/gateway-nails-preflight.sh")
          text = script_path.read_text(encoding="utf-8")

          assert text.startswith("#!/usr/bin/env bash\n")
          assert "\r" not in text
          assert 'RUNBOOK_ID="NAILS-GATEWAY-PREFLIGHT-DIAGNOSTIC"' in text
          assert 'GATEWAY="hermes-gateway-nails.service"' in text
          assert 'DIAGNOSTIC_SHA="${NAILS_DIAGNOSTIC_SHA:-}"' in text
          assert 'changes_executed=false' in text
          assert 'SANITIZED_GATEWAY_LOG_TAIL_BEGIN' in text
          assert 'SANITIZED_GATEWAY_LOG_TAIL_END' in text
          assert 'python3 /dev/fd/3 3<<\'PY\'' in text

          forbidden = (
              "systemctl start",
              "systemctl stop",
              "systemctl restart",
              "systemctl enable",
              "systemctl disable",
              "systemctl reset-failed",
              "git merge",
              "git reset",
              "git checkout",
              "git switch",
              "git push",
              "git commit",
              "docker compose up",
              "docker compose restart",
              "docker restart",
              "alembic",
              "psql ",
              "rm -",
              "cp -",
              "mv ",
              "install -",
              "sed -i",
              "tee ",
          )
          for snippet in forbidden:
              assert snippet not in text, f"forbidden diagnostic mutation: {snippet}"

          marker = "python3 /dev/fd/3 3<<'PY'\n"
          assert text.count(marker) == 1
          python_source = text.split(marker, 1)[1].split("\nPY\n", 1)[0]
          compile(python_source, "gateway-log-sanitizer", "exec")

          readme = Path("ops/diagnostics/README.md").read_text(encoding="utf-8")
          assert "must be read-only" in readme
          assert "The VPS agent only executes" in readme
          assert 'git show "${NAILS_DIAGNOSTIC_SHA}:ops/diagnostics/gateway-nails-preflight.sh" | bash' in readme

          print("DIAGNOSTIC_RUNBOOK_CONTRACT_OK")
          PY
