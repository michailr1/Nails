name: Polish soft-glam foundation

on:
  push:
    branches:
      - feat/ux-205-glam-foundation

permissions:
  contents: write

jobs:
  polish:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feat/ux-205-glam-foundation
      - name: Apply surgical token and brand fixes
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          from pathlib import Path

          css_path = Path("backend/app/web_static/styles.css")
          test_path = Path("backend/tests/test_web_glam_foundation_contract.py")
          css = css_path.read_text(encoding="utf-8")

          css = css.replace(
              "  --primary-dark: #8f4c56;\n",
              "  --primary-dark: #8f4c56;\n  --primary-hover: #aa5e63;\n  --on-primary: #fffaf7;\n",
              1,
          )
          css = css.replace(
              "  --ring: rgba(194, 152, 94, .55);\n",
              "  --ring: rgba(194, 152, 94, .55);\n  --surface-glass: rgba(255, 252, 249, .78);\n  --focus-ring: rgba(194, 152, 94, .72);\n",
              1,
          )
          css = css.replace(
              "    --primary-dark: #eeadaf;\n",
              "    --primary-dark: #eeadaf;\n    --primary-hover: #e49a9d;\n    --on-primary: #2b1f21;\n",
          )
          css = css.replace(
              "    --ring: rgba(216, 181, 120, .5);\n",
              "    --ring: rgba(216, 181, 120, .5);\n    --surface-glass: rgba(45, 34, 36, .82);\n    --focus-ring: rgba(216, 181, 120, .78);\n",
          )
          css = css.replace(
              ".brand { font-family: Georgia, \"Times New Roman\", serif; font-size: 1.6rem; letter-spacing: -.03em; }",
              ".brand { font-family: var(--serif); font-size: 1.6rem; letter-spacing: -.03em; }",
          )
          css = css.replace(
              ".auth-card h1 { margin: 0 0 12px; font-family: Georgia, \"Times New Roman\", serif;",
              ".auth-card h1 { margin: 0 0 12px; font-family: var(--serif);",
          )
          css = css.replace(
              ".primary-button { width: 100%; padding: 14px 18px; color: white; background: var(--primary);",
              ".primary-button { width: 100%; padding: 14px 18px; color: var(--on-primary); background: var(--primary);",
          )
          css = css.replace(
              ".primary-button:hover:not(:disabled) { background: #b87375; transform: translateY(-1px); }",
              ".primary-button:hover:not(:disabled) { background: var(--primary-hover); transform: translateY(-1px); }",
          )
          css = css.replace(
              "background: rgba(255,253,251,.78);",
              "background: var(--surface-glass);",
          )
          css = css.replace(
              "box-shadow: 0 4px 14px rgba(67,45,40,.08);",
              "box-shadow: var(--shadow-soft);",
          )
          css = css.replace(
              "background: rgba(244,238,234,.45);",
              "background: color-mix(in srgb, var(--surface-muted) 45%, transparent);",
          )
          css = css.replace(
              "outline: 2px solid rgba(197,130,131,.28);",
              "outline: 2px solid color-mix(in srgb, var(--primary) 28%, transparent);",
          )

          old_brand = '''.sidebar .brand,
          .center-brand .brand {
            width: 46px;
            min-width: 46px;
            height: 46px;
            display: inline-grid;
            place-items: center;
            border-radius: 50%;
            background: var(--surface);
            box-shadow: 0 0 0 1px var(--border), 0 0 0 4px var(--surface), 0 0 0 5px var(--ring), var(--shadow-soft);
            letter-spacing: 0;
          }'''.replace("          ", "")
          new_brand = '''.sidebar .brand,
          .center-brand .brand {
            display: inline-flex;
            align-items: center;
            gap: 12px;
            letter-spacing: -.03em;
          }

          .sidebar .brand::before,
          .center-brand .brand::before {
            content: "Н";
            width: 46px;
            min-width: 46px;
            height: 46px;
            display: inline-grid;
            place-items: center;
            border-radius: 50%;
            background: var(--surface);
            color: var(--primary-dark);
            box-shadow: 0 0 0 1px var(--border), 0 0 0 4px var(--surface), 0 0 0 5px var(--ring), var(--shadow-soft);
            letter-spacing: 0;
          }

          .center-brand .brand {
            flex-direction: column;
            gap: 10px;
          }'''.replace("          ", "")
          if old_brand not in css:
              raise SystemExit("brand block not found")
          css = css.replace(old_brand, new_brand)
          css = css.replace(
              "background: color-mix(in srgb, var(--surface) 78%, transparent);",
              "background: var(--surface-glass);",
          )
          css = css.replace(
              "color-mix(in srgb, var(--primary) 88%, white)",
              "color-mix(in srgb, var(--primary) 88%, var(--on-primary))",
          )
          css = css.replace(
              "color-mix(in srgb, var(--primary) 92%, white)",
              "color-mix(in srgb, var(--primary-hover) 92%, var(--on-primary))",
          )
          css = css.replace(
              "outline: 3px solid color-mix(in srgb, var(--gold) 72%, transparent);",
              "outline: 3px solid var(--focus-ring);",
          )
          css = css.replace("\n\n\n/* Soft-glam", "\n\n/* Soft-glam")
          css_path.write_text(css, encoding="utf-8")

          test = test_path.read_text(encoding="utf-8")
          test = test.replace(
              'FONT_PATH = "/web/fonts/cormorant-garamond-cyrillic-500-normal.woff2"\n',
              'FONT_NAME = "cormorant-garamond-cyrillic-500-normal.woff2"\nFONT_PATH = f"/web/fonts/{FONT_NAME}"\n',
          )
          test = test.replace(
              '    assert "font-display: swap" in css\n',
              '    assert "font-display: swap" in css\n\n    font = WEB_STATIC / "fonts" / FONT_NAME\n    assert font.stat().st_size > 10_000\n    assert font.read_bytes()[:4] == b"wOF2"\n',
          )
          test = test.replace(
              '    assert "background-attachment: fixed" in css\n',
              '    assert "background-attachment: fixed" in css\n    assert css.count(":root {") == 1\n    assert "font-family: Georgia" not in css\n',
          )
          test_path.write_text(test, encoding="utf-8")
          PY
      - name: Validate result
        shell: bash
        run: |
          set -euo pipefail
          grep -q 'content: "Н"' backend/app/web_static/styles.css
          grep -q -- '--primary-hover:' backend/app/web_static/styles.css
          ! grep -q 'font-family: Georgia' backend/app/web_static/styles.css
          test "$(head -c 4 backend/app/web_static/fonts/cormorant-garamond-cyrillic-500-normal.woff2)" = "wOF2"
      - name: Commit polish
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "Claude"
          git config user.email "noreply@anthropic.com"
          git add backend/app/web_static/styles.css backend/tests/test_web_glam_foundation_contract.py
          git commit -m "fix(web): polish tokenized brand foundation" -m "Refs #205"
          git push origin HEAD:feat/ux-205-glam-foundation
