name: Ruff portal diagnostic

on:
  pull_request:

permissions:
  contents: read

jobs:
  ruff:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install --quiet 'ruff>=0.9,<1'
      - name: Fix portal auth imports
        run: ruff check app/services/web_portal_auth.py --fix
      - uses: actions/upload-artifact@v4
        with:
          name: ruff-fixed-portal-auth
          path: backend/app/services/web_portal_auth.py
