name: Diagnostic digest tests

on:
  pull_request:

permissions:
  contents: read

jobs:
  diagnostic:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_DB: nails_test
          POSTGRES_USER: nails_app
          POSTGRES_PASSWORD: nails_test
        ports:
          - 55432:5432
        options: >-
          --health-cmd "pg_isready -U nails_app -d nails_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 12
    env:
      APP_TIMEZONE: Europe/Berlin
      INTERNAL_API_KEY: diagnostic-placeholder-123456789
      DATABASE_URL: postgresql+psycopg://nails_app:nails_test@127.0.0.1:55432/nails_test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - working-directory: backend
        run: python -m pip install --upgrade pip && pip install -e '.[dev]'
      - working-directory: backend
        run: alembic upgrade head
      - working-directory: backend
        run: |
          set +e
          pytest -q > ../digest-tests.txt 2>&1
          printf '%s\n' "$?" > ../digest-tests.status
      - uses: actions/upload-artifact@v4
        with:
          name: digest-tests
          path: |
            digest-tests.txt
            digest-tests.status
          retention-days: 1
      - run: test "$(cat digest-tests.status)" = "0"
