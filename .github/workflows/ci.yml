name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  backend:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_DB: nails_test
          POSTGRES_USER: nails_app
          POSTGRES_PASSWORD: nails_test
        ports:
          - 55432:5432
        options: >-
          --health-cmd "pg_isready -U nails_app -d nails_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 12

    env:
      APP_TIMEZONE: Europe/Berlin
      INTERNAL_API_KEY: test-only-internal-api-key-0000000000000000
      DATABASE_URL: postgresql+psycopg://nails_app:nails_test@127.0.0.1:55432/nails_test

    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/pyproject.toml

      - name: Install backend and development dependencies
        run: python -m pip install --upgrade pip && pip install -e '.[dev]'

      - name: Ruff
        run: ruff check .

      - name: Apply migrations to a clean database
        run: alembic upgrade head

      - name: Verify repeated migration is safe
        run: alembic upgrade head

      - name: Test
        run: pytest

  hermes-plugin:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install plugin test dependencies
        run: python -m pip install --upgrade pip && pip install httpx pytest pyyaml ruff

      - name: Validate plugin manifest
        run: |
          python - <<'PY'
          from pathlib import Path
          import yaml

          manifest = yaml.safe_load(
              Path("hermes/plugins/nails_onboarding/plugin.yaml").read_text(encoding="utf-8")
          )
          assert manifest["name"] == "nails-onboarding"
          assert manifest["provides_tools"] == ["nails_onboarding"]
          required = manifest["requires_env"]
          assert len(required) == 1
          assert required[0]["name"] == "NAILS_INTERNAL_API_KEY"
          assert required[0]["secret"] is True
          PY

      - name: Ruff plugin
        run: >-
          ruff check
          --config backend/pyproject.toml
          hermes/plugins/nails_onboarding

      - name: Test plugin
        env:
          PYTHONPATH: hermes/plugins
        run: pytest -q hermes/plugins/nails_onboarding/tests

  hermes-scheduling-plugin:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install plugin test dependencies
        run: python -m pip install --upgrade pip && pip install httpx pytest pyyaml ruff

      - name: Validate scheduling plugin manifest
        run: |
          python - <<'PY'
          from pathlib import Path
          import yaml

          manifest = yaml.safe_load(
              Path("hermes/plugins/nails_scheduling/plugin.yaml").read_text(encoding="utf-8")
          )
          assert manifest["name"] == "nails-scheduling"
          assert manifest["provides_tools"] == ["nails_scheduling", "save_feedback"]
          required = manifest["requires_env"]
          assert len(required) == 1
          assert required[0]["name"] == "NAILS_INTERNAL_API_KEY"
          assert required[0]["secret"] is True
          PY

      - name: Ruff scheduling plugin
        run: >-
          ruff check
          --config backend/pyproject.toml
          hermes/plugins/nails_scheduling

      - name: Test scheduling plugin
        env:
          PYTHONPATH: hermes/plugins
        run: pytest -q hermes/plugins/nails_scheduling/tests

  backup-contract:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Validate scripts and retention tests
        run: |
          bash -n ops/backup/backup.sh
          bash -n ops/deploy/deploy.sh
          python -m py_compile ops/backup/retention.py ops/backup/test_retention.py
          python ops/backup/test_retention.py

      - name: Validate systemd units
        run: systemd-analyze verify ops/backup/nails-backup.service ops/backup/nails-backup.timer

      - name: Validate backup invariants
        run: |
          grep -q 'gzip -t' ops/backup/backup.sh
          grep -q 'createdb' ops/backup/backup.sh
          grep -q 'dropdb --if-exists --force' ops/backup/backup.sh
          grep -q 'NAILS_BACKUP_TELEGRAM_CHAT_ID' ops/backup/backup.sh
          grep -q 'systemctl enable --now nails-backup.timer' ops/deploy/deploy.sh
          ! grep -R --line-number -E 'bot[0-9]+:[A-Za-z0-9_-]+' ops/backup

  compose-smoke:
    runs-on: ubuntu-latest
    needs: [backend, hermes-plugin, hermes-scheduling-plugin, backup-contract]

    steps:
      - uses: actions/checkout@v4

      - name: Build and start the isolated stack
        run: >-
          docker compose --env-file .env.example
          up -d --build --wait --wait-timeout 180

      - name: Verify application role is restricted
        run: |
          flags="$(docker compose --env-file .env.example exec -T nails-db \
            psql -U nails_admin -d nails -Atc \
            "SELECT CASE WHEN rolsuper THEN 1 ELSE 0 END || '|' || CASE WHEN rolcreatedb THEN 1 ELSE 0 END || '|' || CASE WHEN rolcreaterole THEN 1 ELSE 0 END || '|' || CASE WHEN rolreplication THEN 1 ELSE 0 END FROM pg_roles WHERE rolname = 'nails_app'")"
          test "$flags" = "0|0|0|0"

      - name: Verify API connects as the restricted role
        run: |
          current_user="$(docker compose --env-file .env.example exec -T nails-api \
            python -c "from sqlalchemy import create_engine, text; from app.config import get_settings; engine = create_engine(get_settings().database_url); connection = engine.connect(); print(connection.execute(text('SELECT current_user')).scalar_one()); connection.close(); engine.dispose()")"
          test "$current_user" = "nails_app"

      - name: Verify health and readiness over the loopback port
        run: |
          docker compose --env-file .env.example port nails-api 8000
          curl --retry 5 --retry-delay 1 --retry-connrefused --fail --silent --show-error http://127.0.0.1:8210/health
          curl --retry 5 --retry-delay 1 --retry-connrefused --fail --silent --show-error http://127.0.0.1:8210/ready

      - name: Verify onboarding state survives API restart
        run: |
          docker compose --env-file .env.example exec -T nails-db \
            psql -U nails_admin -d nails -v ON_ERROR_STOP=1 -c \
            "INSERT INTO users (id, telegram_user_id, role, is_active) VALUES ('00000000-0000-4000-8000-000000000003', 900000003, 'admin', true)"

          headers=(-H "X-Nails-Internal-Key: example-only-internal-api-key-not-secret" \
                   -H "X-Telegram-User-ID: 900000003" \
                   -H "X-Request-ID: compose-smoke")

          curl --fail --silent --show-error -X POST "${headers[@]}" \
            http://127.0.0.1:8210/api/v1/onboarding/start | grep '"status":"in_progress"'

          curl --fail --silent --show-error -X POST "${headers[@]}" \
            http://127.0.0.1:8210/api/v1/onboarding/pause | grep '"status":"paused"'

          docker compose --env-file .env.example restart nails-api
          docker compose --env-file .env.example up -d --wait --wait-timeout 180

          curl --fail --silent --show-error "${headers[@]}" \
            http://127.0.0.1:8210/api/v1/onboarding | grep '"status":"paused"'

      - name: Stop the isolated stack
        if: always()
        run: docker compose --env-file .env.example down --volumes --remove-orphans
