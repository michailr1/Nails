name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  backend:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_DB: nails_test
          POSTGRES_USER: nails_app
          POSTGRES_PASSWORD: nails_test
        ports:
          - 55432:5432
        options: >-
          --health-cmd "pg_isready -U nails_app -d nails_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 12

    env:
      APP_TIMEZONE: Europe/Berlin
      DATABASE_URL: postgresql+psycopg://nails_app:nails_test@127.0.0.1:55432/nails_test

    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/pyproject.toml

      - name: Install backend and development dependencies
        run: python -m pip install --upgrade pip && pip install -e '.[dev]'

      - name: Ruff
        run: ruff check .

      - name: Apply migrations to a clean database
        run: alembic upgrade head

      - name: Verify repeated migration is safe
        run: alembic upgrade head

      - name: Test
        run: pytest

  compose-smoke:
    runs-on: ubuntu-latest
    needs: backend

    steps:
      - uses: actions/checkout@v4

      - name: Build and start the isolated stack
        run: >-
          docker compose --env-file .env.example
          up -d --build --wait --wait-timeout 180

      - name: Verify application role is restricted
        run: |
          flags="$(docker compose --env-file .env.example exec -T nails-db \
            psql -U nails_admin -d nails -Atc \
            "SELECT CASE WHEN rolsuper THEN 1 ELSE 0 END || '|' || CASE WHEN rolcreatedb THEN 1 ELSE 0 END || '|' || CASE WHEN rolcreaterole THEN 1 ELSE 0 END || '|' || CASE WHEN rolreplication THEN 1 ELSE 0 END FROM pg_roles WHERE rolname = 'nails_app'")"
          test "$flags" = "0|0|0|0"

      - name: Verify API connects as the restricted role
        run: |
          current_user="$(docker compose --env-file .env.example exec -T nails-api \
            python -c "from sqlalchemy import create_engine, text; from app.config import get_settings; engine = create_engine(get_settings().database_url); connection = engine.connect(); print(connection.execute(text('SELECT current_user')).scalar_one()); connection.close(); engine.dispose()")"
          test "$current_user" = "nails_app"

      - name: Verify health and readiness over the loopback port
        run: |
          docker compose --env-file .env.example port nails-api 8000
          curl --retry 5 --retry-delay 1 --retry-connrefused --fail --silent --show-error http://127.0.0.1:8210/health
          curl --retry 5 --retry-delay 1 --retry-connrefused --fail --silent --show-error http://127.0.0.1:8210/ready

      - name: Stop the isolated stack
        if: always()
        run: docker compose --env-file .env.example down --volumes --remove-orphans
