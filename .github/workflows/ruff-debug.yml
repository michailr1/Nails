name: Ruff debug

on:
  pull_request:

permissions:
  contents: read
  pull-requests: write

jobs:
  ruff:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          show-progress: false
      - uses: astral-sh/ruff-action@v3
        id: ruff
        continue-on-error: true
        with:
          args: check backend/app backend/tests --output-format=concise
      - name: Publish failure
        if: steps.ruff.outcome == 'failure'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          output="$(cd backend && ruff check app tests --output-format=concise 2>&1 || true)"
          gh pr comment "${{ github.event.pull_request.number }}" --body "<!-- ruff-debug -->
          \`\`\`text
          ${output}
          \`\`\`"
          exit 1
