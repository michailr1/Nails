name: Ruff debug

on:
  pull_request:

permissions:
  contents: read

jobs:
  ruff:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          show-progress: false
      - uses: astral-sh/ruff-action@v3
        with:
          args: check backend/app backend/tests
