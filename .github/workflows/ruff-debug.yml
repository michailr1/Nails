name: Ruff debug

on:
  pull_request:

permissions:
  contents: read

jobs:
  ruff:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install Ruff
        run: python -m pip install 'ruff>=0.9,<1'
      - name: Ruff
        run: cd backend && ruff check app tests
