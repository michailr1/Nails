name: Diagnostic scheduling plugin

on:
  pull_request:

permissions:
  contents: read

jobs:
  diagnostic:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install test dependencies
        run: python -m pip install --upgrade pip && pip install httpx pytest pyyaml ruff

      - name: Capture scheduling plugin tests
        id: tests
        continue-on-error: true
        env:
          PYTHONPATH: hermes/plugins
        run: |
          set +e
          pytest -q hermes/plugins/nails_scheduling/tests > scheduling-plugin-pytest.txt 2>&1
          status=$?
          printf '%s\n' "$status" > scheduling-plugin-pytest.status
          exit 0

      - name: Upload diagnostic output
        uses: actions/upload-artifact@v4
        with:
          name: scheduling-plugin-pytest
          path: |
            scheduling-plugin-pytest.txt
            scheduling-plugin-pytest.status
          if-no-files-found: error
          retention-days: 1

      - name: Fail when tests failed
        run: test "$(cat scheduling-plugin-pytest.status)" = "0"
