name: Ruff autofix

on:
  push:
    branches:
      - "feat/service-management"

permissions:
  contents: write

jobs:
  autofix:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feat/service-management
      - name: Install Ruff
        run: python -m pip install --quiet 'ruff>=0.9,<1'
      - name: Apply safe Ruff fixes
        run: |
          cd backend
          ruff check --fix app/services/scheduling_services.py tests/test_scheduling_services.py
          cd ..
          python - <<'PY'
          from pathlib import Path

          path = Path("hermes/plugins/nails_scheduling/validation.py")
          text = path.read_text(encoding="utf-8")
          old = "not isinstance(value, (int, float, str))"
          new = "not isinstance(value, int | float | str)"
          assert old in text or new in text
          path.write_text(text.replace(old, new), encoding="utf-8")
          PY
          ruff check --fix --config backend/pyproject.toml \
            hermes/plugins/nails_scheduling/validation.py
      - name: Commit safe fixes
        run: |
          if git diff --quiet; then
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add backend/app/services/scheduling_services.py \
            backend/tests/test_scheduling_services.py \
            hermes/plugins/nails_scheduling/validation.py
          git commit -m "fix: apply remaining Ruff service management fixes"
          git push origin HEAD:feat/service-management
