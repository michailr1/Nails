name: Diagnostic Slice E Ruff

on:
  pull_request:

permissions:
  contents: read

jobs:
  diagnostic:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python -m pip install 'ruff>=0.9,<1'
      - run: ruff check --fix backend/tests/test_catalog_batch_plugin.py
      - uses: actions/upload-artifact@v4
        with:
          name: slice-e-ruff-fixed
          path: backend/tests/test_catalog_batch_plugin.py
          retention-days: 1
