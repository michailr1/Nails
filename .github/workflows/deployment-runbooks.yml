name: Deployment runbooks

on:
  push:
    branches: [main]
    paths:
      - "ops/deploy/**"
      - ".github/workflows/deployment-runbooks.yml"
  pull_request:
    paths:
      - "ops/deploy/**"
      - ".github/workflows/deployment-runbooks.yml"

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Validate Bash syntax
        run: |
          bash -n ops/deploy/nails-002e4.sh
          bash -n ops/deploy/nails-002e4-v2.sh

      - name: Validate legacy artifact and corrected E4 boundary
        run: |
          python - <<'PY'
          from pathlib import Path

          legacy_path = Path("ops/deploy/nails-002e4.sh")
          current_path = Path("ops/deploy/nails-002e4-v2.sh")
          readme_path = Path("ops/deploy/README.md")

          legacy = legacy_path.read_text(encoding="utf-8")
          current = current_path.read_text(encoding="utf-8")
          readme = readme_path.read_text(encoding="utf-8")
          lines = current.splitlines()

          # The first runbook remains an immutable, blocked audit artifact.
          assert legacy.startswith("#!/usr/bin/env bash\n")
          assert 'EXPECTED_BEFORE="5565a524b75a04fe5d8bc2c3e758d2994e9d9c12"' in legacy
          assert 'systemctl stop "$GATEWAY"' in legacy
          assert 'OLD_ALLOWLIST="clarify,image_gen,nails_onboarding,skills,tts,vision"' in legacy
          assert "nails-002e4.sh` must **not** be executed again" in readme

          # V2 identity and release ancestry.
          assert current.startswith("#!/usr/bin/env bash\n")
          assert "\r" not in current
          assert 'RUNBOOK_ID="NAILS-002E4-V2"' in current
          assert 'EXPECTED_BEFORE="5565a524b75a04fe5d8bc2c3e758d2994e9d9c12"' in current
          assert 'EXPECTED_FEATURE_ANCESTOR="77b6ca69286d7f2c203a85c04f4224f783038fdf"' in current
          assert 'EXPECTED_INFRA_ANCESTOR="e80c2e0e75afdcbb4462abf45c4f1f52a1208e9a"' in current
          assert 'RELEASE_SHA="${NAILS_RELEASE_SHA:-}"' in current
          assert 'git merge --ff-only "$RELEASE_SHA"' in current
          assert 'git -C "$REPO" reset --hard "$HEAD_BEFORE"' in current
          assert 'git cat-file -e "${RELEASE_SHA}:ops/deploy/nails-002e4-v2.sh"' in current

          # Correct root user-level systemd boundary.
          assert 'USER_RUNTIME_DIR="/run/user/0"' in current
          assert 'XDG_RUNTIME_DIR="$USER_RUNTIME_DIR" systemctl --user "$@"' in current
          assert 'XDG_RUNTIME_DIR="$USER_RUNTIME_DIR" journalctl --user "$@"' in current
          assert 'GATEWAY_FRAGMENT="/root/.config/systemd/user/hermes-gateway-nails.service"' in current
          assert 'user_systemctl stop "$GATEWAY"' in current
          assert 'user_systemctl start "$GATEWAY"' in current
          assert 'systemctl stop "$GATEWAY"' not in current
          assert 'systemctl start "$GATEWAY"' not in current
          assert 'systemctl restart "$GATEWAY"' not in current

          # Exact Hermes and structured YAML contract.
          assert 'Hermes Agent v0.18.2 (2026.7.7.2)' in current
          assert 'PROFILE_CONFIG="${PROFILE}/config.yaml"' in current
          assert 'plugins.get("enabled") == ["nails-onboarding"]' in current
          assert 'plugins.get("enabled") == ["nails-onboarding", "nails-scheduling"]' in current
          assert '"nails_onboarding",\n    "nails_scheduling",' in current
          assert 'yaml.safe_load' in current
          assert 'yaml.safe_dump' in current
          assert 'os.replace(temp_name, path)' in current
          assert 'CONFIG_UPDATED_ATOMICALLY=true' in current
          assert 'HERMES_HOME="$PROFILE" "$HERMES_BIN" --profile nails config check' in current
          assert 'enabled user 0.5.0 nails-onboarding' in current
          assert 'enabled user 0.1.0 nails-scheduling' in current
          assert 'PLUGIN_REGISTRY_OK=true' in current
          assert 'TELEGRAM_VISIBILITY_OK=true' in current

          # Backup and rollback semantics.
          assert 'cp -a "$PROFILE_CONFIG" "${BACKUP_DIR}/config.before"' in current
          assert 'MUTATION_STARTED="false"' in current
          assert 'if [[ "$MUTATION_STARTED" != "true" ]]' in current
          assert 'ROLLBACK_PERFORMED=false' in current
          assert 'ROLLBACK_REASON=no-production-mutation-started' in current
          assert 'restore_runtime_from_backup' in current

          # Backend and Docker must remain untouched.
          assert 'backend_api_container_unchanged=true' in current
          assert 'backend_db_container_unchanged=true' in current
          assert 'docker_daemon_unchanged=true' in current
          assert 'migration_executed=false' in current
          assert 'database_write_executed=false' in current
          assert 'backend_restart_executed=false' in current
          assert 'NAILS_002E4_DEPLOYMENT_OK' in current

          forbidden = (
              "git push",
              "git commit",
              "git checkout -b",
              "git switch -c",
              "gh pr",
              "gh issue",
              "docker compose up",
              "docker compose restart",
              "docker restart",
              "alembic upgrade",
              "psql ",
              "plugins enable",
              "plugins disable",
              "plugins install",
              "plugins remove",
          )
          for snippet in forbidden:
              assert snippet not in current, f"forbidden deployment operation: {snippet}"

          expected_release_files = {
              "__init__.py",
              "operations.py",
              "plugin.yaml",
              "presenters.py",
              "schemas.py",
              "tools.py",
              "transport.py",
              "validation.py",
          }
          start = lines.index("RELEASE_FILES=(") + 1
          end = lines.index(")", start)
          actual_release_files = {
              line.strip().strip('"')
              for line in lines[start:end]
              if line.strip()
          }
          assert actual_release_files == expected_release_files

          snippets = []
          index = 0
          while index < len(lines):
              if "<<'PY'" not in lines[index]:
                  index += 1
                  continue
              index += 1
              snippet = []
              while index < len(lines) and lines[index] != "PY":
                  snippet.append(lines[index])
                  index += 1
              assert index < len(lines), "unterminated embedded Python heredoc"
              snippets.append("\n".join(snippet) + "\n")
              index += 1

          assert len(snippets) == 10
          for number, snippet in enumerate(snippets, start=1):
              compile(snippet, f"embedded-python-{number}", "exec")

          assert "ops/deploy/nails-002e4-v2.sh" in readme
          assert "NAILS_002E4_DEPLOYMENT_OK" in readme
          assert "root user-level systemd" in readme
          assert "atomically updates" in readme
          assert "nails-scheduling` to `plugins.enabled" in readme
          assert "nails_scheduling` to `platform_toolsets.telegram" in readme
          assert "This runbook is not authorized merely because it exists on a branch" in readme
          assert "<EXACT_APPROVED_RELEASE_SHA>" in readme
          assert "<APPROVED_RUNBOOK>.sh" in readme
          assert 'git show "${NAILS_RELEASE_SHA}:ops/deploy/nails-002e4.sh" | bash' not in readme

          print("DEPLOYMENT_RUNBOOK_V2_CONTRACT_OK")
          PY
