name: Pytest debug

on:
  pull_request:

permissions:
  contents: read
  pull-requests: write

jobs:
  pytest:
    runs-on: ubuntu-24.04
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_DB: nails_test
          POSTGRES_USER: nails_app
          POSTGRES_PASSWORD: nails_test
        ports:
          - 55432:5432
        options: >-
          --health-cmd "pg_isready -U nails_app -d nails_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 12
    env:
      DATABASE_URL: postgresql+psycopg://nails_app:nails_test@127.0.0.1:55432/nails_test
      INTERNAL_API_KEY: test-internal-key
      WEB_AUTH_ENABLED: "true"
      WEB_AUTH_HMAC_KEY: test-web-auth-hmac-key-that-is-long-enough
    steps:
      - uses: actions/checkout@v4
        with:
          show-progress: false
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python -m pip install -e 'backend[dev]'
      - run: cd backend && alembic upgrade head
      - name: Test and publish failure
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set +e
          output="$(cd backend && pytest -q 2>&1)"
          status=$?
          if [ "$status" -ne 0 ]; then
            tail_output="$(printf '%s\n' "$output" | tail -n 120)"
            gh pr comment "${{ github.event.pull_request.number }}" --body "<!-- pytest-debug -->
          \`\`\`text
          ${tail_output}
          \`\`\`"
            exit "$status"
          fi
