name: Backend test diagnostics

on:
  pull_request:
    paths:
      - "backend/**"
      - ".github/workflows/backend-test-diagnostics.yml"

permissions:
  contents: read

jobs:
  backend:
    runs-on: ubuntu-latest
    env:
      APP_TIMEZONE: Europe/Berlin
      INTERNAL_API_KEY: test-only-internal-api-key-0000000000000000
      DATABASE_URL: postgresql+psycopg://nails_app:nails_test@127.0.0.1:55432/nails_test
      GH_TOKEN: ${{ github.token }}
    steps:
      - name: Run first failing backend test with compact output
        run: |
          docker pull postgres:17-alpine >/dev/null 2>&1
          docker run --detach --rm --name nails-test-db \
            -e POSTGRES_DB=nails_test \
            -e POSTGRES_USER=nails_app \
            -e POSTGRES_PASSWORD=nails_test \
            -p 55432:5432 postgres:17-alpine >/dev/null
          for attempt in $(seq 1 30); do
            docker exec nails-test-db pg_isready -U nails_app -d nails_test >/dev/null 2>&1 && break
            sleep 1
          done
          docker exec nails-test-db pg_isready -U nails_app -d nails_test >/dev/null
          curl --fail --silent --show-error --location \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}/tarball/${GITHUB_SHA}" \
            | tar -xz --strip-components=1
          cd backend
          python -m pip install --quiet -e '.[dev]'
          alembic upgrade head >/dev/null 2>&1
          pytest -q -x --tb=short >/tmp/backend-pytest.log 2>&1 || {
            tail -n 80 /tmp/backend-pytest.log
            exit 1
          }
