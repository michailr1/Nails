name: WEB-001A Migration Diagnostic

on:
  push:
    branches:
      - feat/web001a-auth-session

permissions:
  contents: write

jobs:
  diagnose:
    if: ${{ !contains(github.event.head_commit.message, '[migration-diagnostic]') }}
    runs-on: ubuntu-24.04
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_DB: nails_test
          POSTGRES_USER: nails_app
          POSTGRES_HOST_AUTH_METHOD: trust
        ports:
          - 55432:5432
        options: >-
          --health-cmd "pg_isready -U nails_app -d nails_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 12
    env:
      APP_TIMEZONE: Europe/Berlin
      INTERNAL_API_KEY: ${{ github.sha }}
      DATABASE_URL: postgresql+psycopg://nails_app@127.0.0.1:55432/nails_test
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feat/web001a-auth-session
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install backend
        working-directory: backend
        run: python -m pip install -e '.[dev]'
      - name: Capture migration output
        working-directory: backend
        run: |
          set +e
          alembic upgrade head > ../migration-diagnostic.txt 2>&1
          code=$?
          tail -n 80 ../migration-diagnostic.txt > ../migration-diagnostic-short.txt
          mv ../migration-diagnostic-short.txt ../migration-diagnostic.txt
          echo "exit_code=$code" >> ../migration-diagnostic.txt
      - name: Commit diagnostic and remove workflow
        run: |
          rm .github/workflows/web001a-migration-diagnostic.yml
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add migration-diagnostic.txt .github/workflows/web001a-migration-diagnostic.yml
          git commit -m 'ci: capture migration diagnostic [migration-diagnostic]'
          git push origin HEAD:feat/web001a-auth-session
