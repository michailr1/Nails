name: PR 211 backend diagnostic

on:
  pull_request:
    paths:
      - "backend/**"
      - ".github/workflows/pr211-diagnostic.yml"

permissions:
  contents: read

jobs:
  pilot-time-calibration:
    runs-on: ubuntu-24.04
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_DB: nails_test
          POSTGRES_USER: nails_app
          POSTGRES_PASSWORD: nails_test
        ports:
          - 55432:5432
        options: >-
          --health-cmd "pg_isready -U nails_app -d nails_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 12
    env:
      APP_TIMEZONE: Europe/Berlin
      DATABASE_URL: postgresql+psycopg://nails_app:nails_test@127.0.0.1:55432/nails_test
      INTERNAL_API_KEY: test-only-internal-api-key-0000000000000000
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install backend dependencies
        run: pip install -q -e ".[dev]"
      - name: Capture migration output
        id: migrate
        continue-on-error: true
        run: alembic upgrade head > ../migration-diagnostic.log 2>&1
      - name: Capture pilot regression output
        id: tests
        if: steps.migrate.outcome == 'success'
        continue-on-error: true
        run: pytest -vv tests/test_pilot_time_calibration.py > ../pytest-diagnostic.log 2>&1
      - name: Upload diagnostic logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pr211-backend-diagnostic
          path: |
            migration-diagnostic.log
            pytest-diagnostic.log
          if-no-files-found: ignore
      - name: Fail when diagnostics failed
        if: steps.migrate.outcome != 'success' || steps.tests.outcome == 'failure'
        run: exit 1
