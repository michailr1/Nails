name: PR 211 backend diagnostic

on:
  pull_request:
    paths:
      - "backend/**"
      - ".github/workflows/pr211-diagnostic.yml"

permissions:
  contents: read

jobs:
  pilot-time-calibration:
    runs-on: ubuntu-24.04
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_DB: nails_test
          POSTGRES_USER: nails_app
          POSTGRES_PASSWORD: nails_test
        ports:
          - 55432:5432
        options: >-
          --health-cmd "pg_isready -U nails_app -d nails_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 12
    env:
      DATABASE_URL: postgresql+psycopg://nails_app:nails_test@127.0.0.1:55432/nails_test
      INTERNAL_API_KEY: iiiiiiiiiiiiiiiiiiiiiiiiiiiiiiiiiiiiiiiiiiiiiiiiiiiiiiiiiiiiiiii
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install backend dependencies
        working-directory: backend
        run: pip install -e ".[dev]"
      - name: Apply migrations
        working-directory: backend
        run: alembic upgrade head
      - name: Run pilot calibration regressions verbosely
        working-directory: backend
        run: pytest -vv tests/test_pilot_time_calibration.py
