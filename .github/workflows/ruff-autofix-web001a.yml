name: WEB-001A Ruff Autofix

on:
  push:
    branches:
      - feat/web001a-auth-session

permissions:
  contents: write

jobs:
  ruff-autofix:
    if: ${{ !contains(github.event.head_commit.message, '[ruff-autofix]') }}
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feat/web001a-auth-session
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install Ruff
        run: python -m pip install 'ruff>=0.9,<1'
      - name: Apply canonical Ruff fixes
        working-directory: backend
        run: |
          ruff check --fix .
          ruff check .
      - name: Remove one-shot workflow and push fix
        run: |
          rm .github/workflows/ruff-autofix-web001a.yml
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add backend/app/services/web_auth.py backend/tests/test_web_auth.py .github/workflows/ruff-autofix-web001a.yml
          git diff --cached --check
          git commit -m 'fix: apply canonical ruff autofix [ruff-autofix]'
          git push origin HEAD:feat/web001a-auth-session
