name: WEB-001A cookie clear fix
on:
  push:
    branches: [feat/web001a-auth-session]
permissions:
  contents: write
jobs:
  patch:
    if: ${{ !contains(github.event.head_commit.message, '[cookie-clear-fix]') }}
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feat/web001a-auth-session
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Patch explicit 401 response
        run: |
          python - <<'PY'
          from pathlib import Path
          path = Path('backend/app/api/web_auth.py')
          text = path.read_text()
          text = text.replace(
              'from fastapi import APIRouter, Depends, HTTPException, Request, Response, status\n',
              'from fastapi import APIRouter, Depends, HTTPException, Request, Response, status\nfrom fastapi.responses import JSONResponse\n',
              1,
          )
          old = '''@router.get("/web/api/auth/session", response_model=WebSessionStateResponse)
          def session_state(
              request: Request,
              response: Response,
              session: SessionDependency,
          ) -> WebSessionStateResponse:
              try:
                  require_web_session_identity(session, request)
              except HTTPException as exc:
                  if exc.status_code == status.HTTP_401_UNAUTHORIZED:
                      clear_auth_cookies(response)
                  raise
              return WebSessionStateResponse(authenticated=True)
          '''
          new = '''@router.get("/web/api/auth/session", response_model=WebSessionStateResponse)
          def session_state(
              request: Request,
              session: SessionDependency,
          ) -> WebSessionStateResponse | JSONResponse:
              try:
                  require_web_session_identity(session, request)
              except HTTPException as exc:
                  if exc.status_code != status.HTTP_401_UNAUTHORIZED:
                      raise
                  response = JSONResponse(
                      status_code=status.HTTP_401_UNAUTHORIZED,
                      content={"detail": {"code": "unauthorized"}},
                  )
                  clear_auth_cookies(response)
                  return response
              return WebSessionStateResponse(authenticated=True)
          '''
          if old not in text:
              raise SystemExit('session route anchor missing')
          path.write_text(text.replace(old, new, 1))
          PY
          rm .github/workflows/web001a-cookie-clear-fix.yml
      - name: Format and push
        run: |
          python -m pip install 'ruff>=0.9,<1'
          ruff check --fix backend/app/api/web_auth.py backend/tests/test_web_auth.py
          ruff check backend/app/api/web_auth.py backend/tests/test_web_auth.py
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add backend/app/api/web_auth.py backend/tests/test_web_auth.py .github/workflows/web001a-cookie-clear-fix.yml
          git diff --cached --check
          git commit -m 'fix: preserve session cookie clearing [cookie-clear-fix]'
          git push origin HEAD:feat/web001a-auth-session
