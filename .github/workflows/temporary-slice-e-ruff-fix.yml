name: Temporary Slice E Ruff Fix

on:
  pull_request:

permissions:
  contents: write

jobs:
  fix:
    if: github.head_ref == 'feat/adr007-slice-e-photo-price-import'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feat/adr007-slice-e-photo-price-import
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: |
          python - <<'PY'
          from pathlib import Path

          path = Path("hermes/plugins/nails_scheduling/schemas.py")
          text = path.read_text(encoding="utf-8")
          old = (
              '        "changes the composed duration. For photo price import, use vision first, show one complete "\n'
              '        "editable table, label durations as suggestions, and call replace_catalog only after one "'
          )
          new = (
              '        "changes the composed duration. For photo price import, use vision first, "\n'
              '        "show one complete editable table, label durations as suggestions, and call "\n'
              '        "replace_catalog only after one "'
          )
          if old not in text:
              raise SystemExit("expected schema text was not found")
          path.write_text(text.replace(old, new, 1), encoding="utf-8")
          PY
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add hermes/plugins/nails_scheduling/schemas.py
          git commit -m 'fix: wrap photo import tool description'
          git push origin HEAD:feat/adr007-slice-e-photo-price-import
