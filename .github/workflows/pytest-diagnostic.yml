name: Pytest diagnostic

on:
  pull_request:

permissions:
  contents: read

jobs:
  pytest:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_DB: nails_test
          POSTGRES_USER: nails_app
          POSTGRES_PASSWORD: nails_test
        ports:
          - 55432:5432
        options: >-
          --health-cmd "pg_isready -U nails_app -d nails_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 12
    defaults:
      run:
        working-directory: backend
    env:
      APP_TIMEZONE: Europe/Berlin
      INTERNAL_API_KEY: test-only-internal-api-key-0000000000000000
      DATABASE_URL: postgresql+psycopg://nails_app:nails_test@127.0.0.1:55432/nails_test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: pip install --quiet -e '.[dev]'
      - name: Apply migrations
        run: alembic upgrade head
      - name: Run tests with concise failure output
        shell: bash
        run: |
          set +e
          pytest -q --tb=short > /tmp/pytest.log 2>&1
          status=$?
          tail -120 /tmp/pytest.log
          exit $status
