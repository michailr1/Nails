name: Admin tests diagnostic

on:
  pull_request:

permissions:
  contents: write

jobs:
  admin-tests:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_DB: nails_test
          POSTGRES_USER: nails_app
          POSTGRES_PASSWORD: nails_test
        ports:
          - 55432:5432
        options: >-
          --health-cmd "pg_isready -U nails_app -d nails_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 12
    env:
      APP_TIMEZONE: Europe/Berlin
      INTERNAL_API_KEY: test-only-internal-api-key-0000000000000000
      DATABASE_URL: postgresql+psycopg://nails_app:nails_test@127.0.0.1:55432/nails_test
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
      - name: Apply admin session consume gate
        working-directory: .
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path('backend/app/services/web_auth.py')
          content = path.read_text(encoding='utf-8')
          old = '''            User.id == challenge.user_id,
            User.is_active.is_(True),
            User.role == UserRole.master,
'''
          new = '''            User.id == challenge.user_id,
            User.is_active.is_(True),
            User.role.in_({UserRole.master, UserRole.admin}),
'''
          if old in content:
              path.write_text(content.replace(old, new, 1), encoding='utf-8')
          elif new not in content:
              raise SystemExit('expected session user role gate not found')
          PY
          if ! git diff --quiet; then
            git config user.name github-actions[bot]
            git config user.email 41898282+github-actions[bot]@users.noreply.github.com
            git add backend/app/services/web_auth.py
            git commit -m 'feat(auth): allow admin web sessions'
            git push origin HEAD:${{ github.head_ref }}
          fi
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python -m pip install --upgrade pip && pip install -e '.[dev]'
      - run: alembic upgrade head
      - name: Capture admin tests
        id: tests
        continue-on-error: true
        run: pytest tests/test_web_admin.py -vv > /tmp/admin-tests.txt 2>&1
      - uses: actions/upload-artifact@v4
        with:
          name: admin-tests-diagnostic
          path: /tmp/admin-tests.txt
      - if: steps.tests.outcome == 'failure'
        run: exit 1
