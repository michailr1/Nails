name: Temporary Slice E Test Fix

on:
  pull_request:

permissions:
  contents: write

jobs:
  fix:
    if: github.head_ref == 'feat/adr007-slice-e-photo-price-import'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feat/adr007-slice-e-photo-price-import
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: |
          python - <<'PY'
          from pathlib import Path

          path = Path("hermes/plugins/nails_scheduling/tests/test_plugin.py")
          text = path.read_text(encoding="utf-8")
          text = text.replace(
              '        "days",\n        "include_inactive",',
              '        "days",\n        "services",\n        "include_inactive",',
              1,
          )
          text = text.replace(
              '        "update_service",\n        "day_view",',
              '        "update_service",\n        "replace_catalog",\n        "day_view",',
              1,
          )
          path.write_text(text, encoding="utf-8")
          PY
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add hermes/plugins/nails_scheduling/tests/test_plugin.py
          git commit -m 'test: include catalog batch in public schema contract'
          git push origin HEAD:feat/adr007-slice-e-photo-price-import
