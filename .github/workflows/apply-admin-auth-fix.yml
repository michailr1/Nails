name: Apply admin auth fix

on:
  pull_request:

permissions:
  contents: write

jobs:
  apply:
    if: github.head_ref == 'feat/admin-master-management'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
      - name: Update approval role gate
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path('backend/app/services/web_auth.py')
          content = path.read_text(encoding='utf-8')
          old = '    if identity.role != UserRole.master:\n        return False\n'
          new = '    if identity.role not in {UserRole.master, UserRole.admin}:\n        return False\n'
          if old in content:
              path.write_text(content.replace(old, new, 1), encoding='utf-8')
          elif new not in content:
              raise SystemExit('expected approval role gate not found')
          PY
      - name: Commit fix when needed
        run: |
          if git diff --quiet; then
            exit 0
          fi
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add backend/app/services/web_auth.py
          git commit -m 'feat(auth): allow admin challenge approval'
          git push origin HEAD:${{ github.head_ref }}
