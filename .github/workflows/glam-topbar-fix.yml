name: Final serif cleanup

on:
  push:
    branches:
      - feat/ux-205-glam-foundation

permissions:
  contents: write

jobs:
  cleanup:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feat/ux-205-glam-foundation
      - name: Replace remaining heading hardcode
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          from pathlib import Path

          path = Path("backend/app/web_static/styles.css")
          css = path.read_text(encoding="utf-8")
          old = '.topbar h1 { margin: 0; font-family: Georgia, "Times New Roman", serif;'
          new = '.topbar h1 { margin: 0; font-family: var(--serif);'
          if old not in css:
              raise SystemExit("topbar serif hardcode not found")
          path.write_text(css.replace(old, new), encoding="utf-8")
          PY
          ! grep -q 'font-family: Georgia' backend/app/web_static/styles.css
      - name: Commit cleanup
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "Claude"
          git config user.email "noreply@anthropic.com"
          git add backend/app/web_static/styles.css
          git commit -m "fix(web): remove remaining serif hardcode" -m "Refs #205"
          git push origin HEAD:feat/ux-205-glam-foundation
