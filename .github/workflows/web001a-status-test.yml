name: WEB-001A status binding test
on:
  push:
    branches: [feat/web001a-auth-session]
permissions:
  contents: write
jobs:
  patch:
    if: ${{ !contains(github.event.head_commit.message, '[status-test]') }}
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feat/web001a-auth-session
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Append focused test
        run: |
          python - <<'PY'
          from pathlib import Path
          path = Path('backend/tests/test_web_auth.py')
          text = path.read_text()
          addition = '''

          def test_status_requires_original_browser_cookie(client, clean_database):
              created = client.post(
                  "/web/api/auth/challenges",
                  headers=WEB_ORIGIN_HEADERS,
              )
              assert created.status_code == 201
              challenge_id = created.json()["challenge_id"]
              path = f"/web/api/auth/challenges/{challenge_id}"
              assert client.get(path, headers=WEB_ORIGIN_HEADERS).status_code == 200
              client.cookies.clear()
              assert client.get(path, headers=WEB_ORIGIN_HEADERS).status_code == 404
          '''
          path.write_text(text + addition)
          PY
          rm .github/workflows/web001a-status-test.yml
      - name: Format and push
        run: |
          python -m pip install 'ruff>=0.9,<1'
          ruff check --fix backend/tests/test_web_auth.py backend/app/api/web_auth.py backend/app/services/web_auth_limits.py
          ruff check backend/tests/test_web_auth.py backend/app/api/web_auth.py backend/app/services/web_auth_limits.py
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add backend/tests/test_web_auth.py backend/app/api/web_auth.py backend/app/services/web_auth_limits.py .github/workflows/web001a-status-test.yml
          git diff --cached --check
          git commit -m 'test: cover status browser binding [status-test]'
          git push origin HEAD:feat/web001a-auth-session
