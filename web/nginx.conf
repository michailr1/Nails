limit_req_zone $binary_remote_addr zone=web_auth:10m rate=10r/m;

server {
    listen 8080;
    server_name _;

    server_tokens off;
    client_max_body_size 16k;
    client_body_timeout 10s;
    send_timeout 15s;
    keepalive_timeout 20s;

    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "no-referrer" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=()" always;
    add_header Content-Security-Policy "default-src 'self'; connect-src 'self'; img-src 'self' data:; style-src 'self'; script-src 'self'; base-uri 'none'; frame-ancestors 'none'; form-action 'self'" always;

    location = /web-health {
        access_log off;
        default_type application/json;
        return 200 '{"status":"ok"}\n';
    }

    location = / {
        return 302 /web/;
    }

    location ^~ /web/api/auth/ {
        limit_req zone=web_auth burst=5 nodelay;
        proxy_pass http://nails-api:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $http_host;
        proxy_set_header Origin $http_origin;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_connect_timeout 3s;
        proxy_read_timeout 15s;
        proxy_send_timeout 15s;
        proxy_buffering off;
    }

    location ^~ /web/api/ {
        proxy_pass http://nails-api:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $http_host;
        proxy_set_header Origin $http_origin;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_connect_timeout 3s;
        proxy_read_timeout 30s;
        proxy_send_timeout 30s;
    }

    location /web/ {
        alias /usr/share/nginx/html/web/;
        try_files $uri $uri/ /web/index.html;
        expires -1;
        add_header Cache-Control "no-store" always;
    }

    location / {
        return 404;
    }
}
