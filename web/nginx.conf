limit_req_zone $binary_remote_addr zone=web_auth_write:10m rate=30r/m;
limit_req_zone $binary_remote_addr zone=web_auth_poll:10m rate=60r/m;

server {
    listen 8080;
    server_name _;

    server_tokens off;
    absolute_redirect off;
    client_max_body_size 16k;
    client_body_timeout 10s;
    send_timeout 15s;
    keepalive_timeout 20s;
    limit_req_status 429;

    resolver 127.0.0.11 valid=10s ipv6=off;
    set $api_upstream http://nails-api:8000;

    # Caddy reaches this loopback-published container through the nails-edge
    # bridge gateway. The exact gateway is verified by the candidate runbook.
    # Do not broaden this trust range or enable real_ip_recursive.
    set_real_ip_from 172.18.0.1;
    real_ip_header X-Real-IP;
    real_ip_recursive off;

    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "no-referrer" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=()" always;
    add_header Content-Security-Policy "default-src 'self'; connect-src 'self'; img-src 'self' data:; style-src 'self'; script-src 'self'; base-uri 'none'; frame-ancestors 'none'; form-action 'self'" always;

    location = /web-health {
        access_log off;
        default_type application/json;
        return 200 '{"status":"ok"}\n';
    }

    location = / {
        return 302 /web/;
    }

    location = /web {
        return 308 /web/;
    }

    # Session, challenge status and consume share the polling budget. Consume is
    # protected by the browser token and server-side attempt cap and must not
    # drain the stricter challenge-start budget.
    location = /web/api/auth/session {
        limit_req zone=web_auth_poll burst=10 nodelay;
        proxy_pass $api_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $http_host;
        proxy_set_header Origin $http_origin;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $remote_addr;
        proxy_set_header X-Forwarded-Proto https;
        proxy_connect_timeout 3s;
        proxy_read_timeout 15s;
        proxy_send_timeout 15s;
        proxy_buffering off;
    }

    location = /web/api/auth/challenges/consume {
        limit_req zone=web_auth_poll burst=10 nodelay;
        proxy_pass $api_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $http_host;
        proxy_set_header Origin $http_origin;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $remote_addr;
        proxy_set_header X-Forwarded-Proto https;
        proxy_connect_timeout 3s;
        proxy_read_timeout 15s;
        proxy_send_timeout 15s;
        proxy_buffering off;
    }

    location ~ ^/web/api/auth/challenges/[0-9a-fA-F-]+$ {
        limit_req zone=web_auth_poll burst=10 nodelay;
        proxy_pass $api_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $http_host;
        proxy_set_header Origin $http_origin;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $remote_addr;
        proxy_set_header X-Forwarded-Proto https;
        proxy_connect_timeout 3s;
        proxy_read_timeout 15s;
        proxy_send_timeout 15s;
        proxy_buffering off;
    }

    location ^~ /web/api/auth/ {
        limit_req zone=web_auth_write burst=10 nodelay;
        proxy_pass $api_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $http_host;
        proxy_set_header Origin $http_origin;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $remote_addr;
        proxy_set_header X-Forwarded-Proto https;
        proxy_connect_timeout 3s;
        proxy_read_timeout 15s;
        proxy_send_timeout 15s;
        proxy_buffering off;
    }

    location ^~ /web/api/ {
        proxy_pass $api_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $http_host;
        proxy_set_header Origin $http_origin;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $remote_addr;
        proxy_set_header X-Forwarded-Proto https;
        proxy_connect_timeout 3s;
        proxy_read_timeout 30s;
        proxy_send_timeout 30s;
    }

    location /web/ {
        alias /usr/share/nginx/html/web/;
        try_files $uri $uri/ /web/index.html;
        expires -1;
        add_header Cache-Control "no-store" always;
    }

    location / {
        return 404;
    }
}
